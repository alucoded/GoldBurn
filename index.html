                                setTargetingSource(null);
                                return;
                            }
                            if (lockedInspectorId === card.instanceId && (!showMenuParams || activeMenu?.id === showMenuParams.id)) {
                                setLockedInspectorId(null);
                                if (showMenuParams) setActiveMenu(null);
                            } else {
                                setInspectedCard(card);
                                setLockedInspectorId(card.instanceId);
                                if (onClick && !isTargetingMode) onClick(e);
                                if (showMenuParams && !isTargetingMode) setActiveMenu(showMenuParams);
                                if (typeof window !== 'undefined' && window.innerWidth >= 1024 && !isTargetingMode) setIsInspectorOpen(true);
                            }
                        }} 
                        onMouseEnter={() => { if(card && !lockedInspectorId) setInspectedCard(card); }}
                        className={`w-full h-full cursor-pointer transition-all hover:scale-105 relative ${isTargetingMode ? 'ring-2 ring-rose-500/50 hover:ring-rose-500 rounded-lg cursor-crosshair' : ''}`}
                    >
                        {renderCardLayout(card, showMenuParams)}
                    </div>
                );
            };

            const renderStatsBlock = () => (
                <div className="bg-stone-900 border border-stone-800 rounded-xl p-4 shadow-md w-full">
                    <div className="flex justify-between items-center mb-1">
                        <h2 className="text-xs font-black text-amber-500 uppercase tracking-widest">{isSoloTest ? 'Deck Testing' : `Room: ${roomCode}`}</h2>
                        <button onClick={handleConcede} className="text-[9px] bg-rose-950/50 text-rose-500 hover:text-rose-300 border border-rose-900/50 hover:bg-rose-900/60 px-2 py-0.5 rounded transition uppercase font-bold tracking-wider">
                            {isSoloTest ? 'Exit Test' : 'Concede'}
                        </button>
                    </div>
                    
                    {!isSoloTest && (
                        <div className="flex items-center justify-between text-[10px] font-mono mb-4">
                            <div className="flex items-center gap-2">
                                <div className={`w-2 h-2 rounded-full ${connected ? 'bg-emerald-500' : 'bg-rose-500 animate-pulse'}`}></div>
                                <span className={connected ? 'text-emerald-400' : 'text-rose-400'}>{connected ? 'P2P Linked' : 'Connection Lost'}</span>
                            </div>
                            <span className="text-stone-400">{formatTime(matchTime)}</span>
                        </div>
                    )}

                    <div className="space-y-3 font-mono text-sm mb-4 mt-2">
                        {!isSoloTest && (
                            <div className="bg-stone-950 border border-stone-850 p-2 rounded flex justify-between items-center">
                                <span className="text-[10px] text-rose-400 uppercase">Enemy Gold</span>
                                <span className="font-bold text-rose-300">{oppGold}</span>
                            </div>
                        )}
                        <div className="bg-stone-950 border border-stone-850 p-2 rounded flex justify-between items-center">
                            <span className="text-[10px] text-amber-500 uppercase">Your Gold</span>
                            <div className="flex items-center gap-2">
                                <button onClick={()=>modifyGold(-1)} className="w-5 h-5 bg-stone-800 hover:bg-stone-700 rounded flex items-center justify-center text-stone-400 transition">-</button>
                                <span className="font-bold text-amber-400 w-4 text-center">{gold}</span>
                                <button onClick={()=>modifyGold(1)} className="w-5 h-5 bg-stone-800 hover:bg-stone-700 rounded flex items-center justify-center text-stone-400 transition">+</button>
                            </div>
                        </div>
                    </div>

                    {!isSoloTest && (
                        <div className="border-t border-stone-800 pt-3 space-y-2">
                            <span className="text-[9px] font-bold text-stone-500 uppercase tracking-widest block">Enemy Info</span>
                            <div className="grid grid-cols-2 gap-2 text-[10px] font-mono">
                                <div className="bg-stone-950 p-1.5 rounded border border-stone-800 flex justify-between">
                                    <span className="text-stone-500">Hand</span><span className="text-stone-300">{oppHandCount}</span>
                                </div>
                                <div className="bg-stone-950 p-1.5 rounded border border-stone-800 flex justify-between">
                                    <span className="text-stone-500">Deck</span><span className="text-stone-300">{oppDeckCount}</span>
                                </div>
                                <button onClick={(e)=>{e.stopPropagation(); openViewer('Enemy Graveyard', oppGrave, 'oppGrave');}} className="bg-stone-800 hover:bg-stone-700 p-1.5 rounded border border-stone-700 flex justify-between transition">
                                    <span className="text-stone-400">Grave</span><span className="text-rose-400">{oppGrave.length}</span>
                                </button>
                                <button onClick={(e)=>{e.stopPropagation(); openViewer('Enemy Void', oppVoid, 'oppVoid');}} className="bg-stone-800 hover:bg-stone-700 p-1.5 rounded border border-stone-700 flex justify-between transition">
                                    <span className="text-stone-400">Void</span><span className="text-indigo-400">{oppVoid.length}</span>
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );

            // Reordered Match Chat to sit ABOVE Actions Log
            const renderLogsChatBlock = () => (
                <div className="flex flex-col gap-4 flex-1 min-h-[300px]">
                    {!isSoloTest && (
                        <div className="flex-1 bg-stone-900 border border-stone-800 rounded-xl p-3 flex flex-col min-h-[150px]">
                            <span className="text-[10px] font-bold text-stone-500 uppercase tracking-widest border-b border-stone-800 pb-1 mb-2">Match Chat</span>
                            <div className="flex-1 overflow-y-auto space-y-1.5 font-mono text-[10px] pr-1 mb-2">
                                {chatLogs.map((c, i) => (
                                    <div key={i} className="leading-tight">
                                        <span className={c.isMe ? "text-emerald-400 font-bold" : "text-rose-500 font-bold"}>{c.sender}: </span>
                                        <span className="text-white">{c.msg}</span>
                                    </div>
                                ))}
                            </div>
                            <form onSubmit={e => { e.preventDefault(); handleSendChat(); }} className="flex gap-1 mt-auto shrink-0">
                                <input type="text" value={chatInput} onChange={e=>setChatInput(e.target.value)} className="flex-1 bg-stone-950 border border-stone-800 rounded px-2 py-1 text-[10px] text-white outline-none focus:border-emerald-600 transition" placeholder="Message..." />
                                <button type="submit" className="bg-stone-800 text-stone-300 px-3 rounded text-[10px] font-bold hover:bg-stone-700 transition">Send</button>
                            </form>
                        </div>
                    )}
                    
                    <div className="flex-1 bg-stone-900 border border-stone-800 rounded-xl p-3 flex flex-col min-h-[120px]">
                        <span className="text-[10px] font-bold text-stone-500 uppercase tracking-widest border-b border-stone-800 pb-1 mb-2">Actions Log</span>
                        <div className="flex-1 overflow-y-auto space-y-1 font-mono text-[9px] text-stone-400 pr-1">
                            {logs.map((l, i) => <div key={i} className="border-b border-stone-950 pb-0.5">{l}</div>)}
                        </div>
                    </div>
                </div>
            );

            // Calculate SVG paths for active pings
            const renderPingOverlay = () => {
                return (
                    <svg className="fixed inset-0 w-full h-full pointer-events-none z-[100]" style={{ overflow: 'visible' }}>
                        {activePings.map(ping => {
                            const src = document.getElementById(ping.source);
                            const tgt = document.getElementById(ping.target);
                            if(!src || !tgt) return null;
                            const srcRect = src.getBoundingClientRect();
                            const tgtRect = tgt.getBoundingClientRect();
                            // Approximate coordinates relative to document flow
                            return (
                                <g key={ping.id}>
                                    <line 
                                        x1={srcRect.left + srcRect.width/2} 
                                        y1={srcRect.top + srcRect.height/2} 
                                        x2={tgtRect.left + tgtRect.width/2} 
                                        y2={tgtRect.top + tgtRect.height/2} 
                                        stroke={ping.color} strokeWidth="4" strokeLinecap="round" className="ping-line" opacity="0.8"
                                    />
                                    <circle cx={tgtRect.left + tgtRect.width/2} cy={tgtRect.top + tgtRect.height/2} r="6" fill={ping.color} opacity="0.8" />
                                </g>
                            );
                        })}
                    </svg>
                );
            };

            // ============================================================================
            // PHASE 1: SETUP SCREEN
            // ============================================================================
            if (setupPhase) {
                return (
                    <div className="h-screen flex flex-col items-center justify-center p-4 relative">
                        {confirmDialog && (
                            <div className="fixed inset-0 bg-black/80 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
                                <div className="bg-stone-900 border border-amber-500 rounded-xl p-6 max-w-sm w-full text-center shadow-2xl">
                                    <p className="text-stone-200 mb-6">{confirmDialog.msg}</p>
                                    <div className="flex gap-4 justify-center">
                                        <button onClick={() => setConfirmDialog(null)} className="flex-1 bg-stone-800 hover:bg-stone-700 py-2 rounded text-stone-300 transition">Cancel</button>
                                        <button onClick={confirmDialog.onConfirm} className="flex-1 bg-amber-700 hover:bg-amber-600 py-2 rounded text-white font-bold transition">Confirm</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        <div className="bg-stone-900 border border-amber-900/50 p-8 rounded-xl max-w-2xl w-full text-center shadow-2xl relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-amber-700 via-amber-500 to-amber-700"></div>
                            
                            <div className="flex justify-between items-center mb-6">
                                <button onClick={handleConcede} className="text-[10px] bg-rose-950/50 text-rose-500 hover:text-rose-300 border border-rose-900/50 hover:bg-rose-900/60 px-3 py-1.5 rounded transition uppercase font-bold tracking-wider">
                                    {isSoloTest ? 'Cancel Testing' : 'Cancel Matchmaking'}
                                </button>
                                <div className="bg-stone-950 border border-stone-800 px-3 py-1.5 rounded-lg shadow flex items-center gap-2">
                                    <span className="text-[9px] uppercase text-stone-500 font-bold">Room Code</span>
                                    <span className="text-sm font-mono text-amber-500 font-black">{roomCode}</span>
                                </div>
                            </div>

                            <h2 className="text-2xl font-black text-amber-500 uppercase tracking-widest mb-2 mt-2">PLACE YOUR VITAL</h2>
                            
                            <p className="text-stone-400 text-sm mb-6 h-6">
                                {!connected ? <span className="text-rose-400 animate-pulse">(The room code is on the top right) Awating other Player...</span> : 
                                 !myVitalLocked ? "Select a slot on your 3x2 grid to position your Vital." : 
                                 <span className="text-emerald-400">Waiting for opponent to lock in their Vital...</span>}
                            </p>
                            
                            <div className="max-w-md mx-auto mb-8 bg-stone-950/50 p-4 rounded-xl border border-stone-800">
                                {[0, 1].map(r => (
                                    <div key={`setup-row-${r}`} className="flex gap-2 justify-center mb-2 last:mb-0">
                                        {[0,1,2].map(c => {
                                            const isSelected = myVitalPos?.r === r && myVitalPos?.c === c;
                                            return (

                            )}

                            {/* Dice Roller Panel */}
                            <div className="bg-stone-950 border border-stone-800 rounded-xl p-4 flex flex-col gap-3 shrink-0">
                                <span className="text-[10px] font-bold text-stone-500 uppercase tracking-widest block text-center">Dice Roller</span>
                                <div className="flex gap-2">
                                    <select 
                                        value={diceType} 
                                        onChange={e => setDiceType(e.target.value)} 
                                        className="flex-1 bg-stone-900 border border-stone-700 rounded px-2 text-xs text-stone-300 outline-none"
                                    >
                                        <option value="4">D4</option>
                                        <option value="6">D6</option>
                                        <option value="8">D8</option>
                                        <option value="12">D12</option>
                                        <option value="20">D20</option>
                                        <option value="coin">Coin Flip</option>
                                    </select>
                                    <button onClick={executeRoll} className="bg-stone-800 hover:bg-stone-700 text-stone-300 font-bold px-4 py-2 rounded text-xs transition border border-stone-700 shadow">Roll</button>
                                </div>
                            </div>

                            <div className="bg-stone-950 border border-stone-800 rounded-xl p-4 flex flex-col items-center shrink-0 mt-auto">
                                <button onClick={() => setTokenModal(true)} className="w-full bg-indigo-900/30 hover:bg-indigo-900/60 text-indigo-400 border border-indigo-900/50 rounded py-2 mb-2 text-xs font-bold uppercase transition flex items-center justify-center gap-2">
                                    Spawn Token
                                </button>
                                <button onClick={clearAllActions} className="w-full bg-amber-900/30 hover:bg-amber-900/60 text-amber-500 border border-amber-900/50 rounded py-2 text-xs font-bold uppercase transition flex items-center justify-center gap-2">
                                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                                    Refresh All Actions
                                </button>
                            </div>

                        </div>
                    </div>

                    {/* Universal Viewer Modal */}
                    {viewModal.isOpen && (
                        <div className="fixed inset-0 bg-black/80 z-[100] flex flex-col items-center justify-center p-6 backdrop-blur-sm">
                            <div className="bg-stone-900 border border-amber-900/40 p-4 md:p-6 rounded-2xl w-full max-w-5xl h-[80vh] flex flex-col shadow-2xl relative">
                                <div className="flex justify-between items-center mb-6 shrink-0 border-b border-stone-800 pb-4">
                                    <h3 className="text-sm md:text-xl font-black text-amber-500 uppercase tracking-widest">{viewModal.title} <span className="text-stone-500 font-mono text-sm ml-2">({viewModal.cards.length})</span></h3>
                                    <button onClick={()=>setViewModal({ isOpen: false })} className="text-stone-400 hover:text-white border border-stone-700 hover:bg-stone-800 px-3 md:px-4 py-1.5 rounded transition uppercase text-[10px] md:text-xs font-bold">Close Menu</button>
                                </div>
                                
                                <div className="flex-1 overflow-y-auto pr-2 flex flex-wrap gap-4 content-start justify-center">
                                    {(viewModal.onSelect ? [...viewModal.cards].sort(() => Math.random() - 0.5) : viewModal.cards).map((card, i) => {
                                        const realIdx = viewModal.onSelect ? viewModal.cards.findIndex(c => c.instanceId === card.instanceId) : null;
                                        
                                        return (
                                            <div 
                                                key={card.instanceId + i} 
                                                onClick={()=> {
                                                    if (viewModal.onSelect) viewModal.onSelect(realIdx);
                                                    else if (viewModal.type === 'myGrave' || viewModal.type === 'myVoid') setModalSelectedIdx(modalSelectedIdx === i ? null : i);
                                                }} 
                                                className={`w-[22vw] sm:w-[100px] h-[30.8vw] sm:h-[140px] relative transition-transform hover:scale-105 ${viewModal.onSelect || viewModal.type === 'myGrave' || viewModal.type === 'myVoid' ? 'cursor-pointer' : ''}`}
                                            >
                                                {renderCardLayout(card)}

                                                {/* Action Overlay for Grave/Void Management */}
                                                {modalSelectedIdx === i && (viewModal.type === 'myGrave' || viewModal.type === 'myVoid') && (
                                                    <div className="absolute inset-0 bg-stone-950/95 z-30 flex flex-col justify-center gap-2 p-2 rounded-lg border border-amber-500 shadow-xl">
                                                        <button onClick={(e)=>{e.stopPropagation(); moveFromPile(viewModal.type, i, 'hand')}} className="bg-stone-800 hover:bg-stone-700 text-stone-200 text-[8px] sm:text-[10px] w-full py-1.5 rounded font-bold uppercase transition">To Hand</button>
                                                        <button onClick={(e)=>{e.stopPropagation(); moveFromPile(viewModal.type, i, 'deck')}} className="bg-emerald-900 hover:bg-emerald-800 text-emerald-200 text-[8px] sm:text-[10px] w-full py-1.5 rounded font-bold uppercase transition">To Deck</button>
                                                        {viewModal.type === 'myGrave' && (
                                                            <button onClick={(e)=>{e.stopPropagation(); moveFromPile(viewModal.type, i, 'void')}} className="bg-indigo-900 hover:bg-indigo-800 text-indigo-200 text-[8px] sm:text-[10px] w-full py-1.5 rounded font-bold uppercase transition">To Void</button>
                                                        )}
                                                        {viewModal.type === 'myVoid' && (
                                                            <button onClick={(e)=>{e.stopPropagation(); moveFromPile(viewModal.type, i, 'grave')}} className="bg-stone-800 hover:bg-stone-700 text-stone-200 text-[8px] sm:text-[10px] w-full py-1.5 rounded font-bold uppercase transition">To Graveyard</button>
                                                        )}
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                    {viewModal.cards.length === 0 && (
                                        <div className="col-span-full w-full h-full flex items-center justify-center text-stone-600 italic text-sm md:text-lg mt-10">
                                            This area is completely empty.
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ZOOM MODAL */}
                    {zoomedCard && (
                        <div className="fixed inset-0 bg-black/90 z-[110] flex items-center justify-center p-4 backdrop-blur-sm" onClick={() => setZoomedCard(null)}>
                            <div className="w-[80vw] h-[112vw] sm:w-[400px] sm:h-[560px] max-w-[400px] max-h-[560px] relative rounded-2xl overflow-hidden shadow-2xl border-2 border-amber-700" onClick={e => e.stopPropagation()}>
                                {zoomedCard.image ? (
                                     <img src={zoomedCard.image} alt={zoomedCard.name} className="w-full h-full object-cover" />
                                ) : (
                                    <div className="flex flex-col items-center justify-center h-full bg-stone-800 text-stone-200 p-6 text-center border-4 border-stone-900">
                                         <h2 className="text-3xl font-bold mb-4 text-amber-500">{zoomedCard.name}</h2>
                                         <p className="text-stone-400 italic text-sm">{zoomedCard.description}</p>
                                     </div>
                                )}
                                <button onClick={() => setZoomedCard(null)} className="absolute top-3 right-3 bg-stone-900/80 text-white rounded-full w-8 h-8 flex items-center justify-center hover:bg-rose-600 border border-stone-700 transition">X</button>
                            </div>
                        </div>
                    )}

                    {/* TOKEN SPAWN MODAL */}
                    {tokenModal && (
                        <div className="fixed inset-0 bg-black/80 z-[110] flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-stone-900 border border-indigo-500 rounded-xl p-6 max-w-sm w-full shadow-2xl">
                                <h3 className="text-indigo-400 font-bold mb-4 uppercase tracking-widest text-center">Custom Token Spawner</h3>
                                <div className="space-y-4 mb-6">
                                    <div>
                                        <label className="text-[10px] text-stone-500 uppercase font-bold">Token Name</label>
                                        <input type="text" value={tokenData.name} onChange={e=>setTokenData({...tokenData, name: e.target.value})} className="w-full bg-stone-950 border border-stone-800 rounded px-3 py-2 text-stone-200 outline-none focus:border-indigo-600 mt-1" placeholder="e.g., Skeleton" />
                                    </div>
                                    <div>
                                        <label className="text-[10px] text-stone-500 uppercase font-bold">HP (Optional)</label>
                                        <input type="number" value={tokenData.hp} onChange={e=>setTokenData({...tokenData, hp: e.target.value})} className="w-full bg-stone-950 border border-stone-800 rounded px-3 py-2 text-stone-200 outline-none focus:border-indigo-600 mt-1" />
                                    </div>
                                </div>
                                <div className="flex gap-4 justify-center">
                                    <button onClick={() => setTokenModal(false)} className="flex-1 bg-stone-800 hover:bg-stone-700 py-2 rounded text-stone-300 transition uppercase font-bold text-xs">Cancel</button>
                                    <button onClick={handleSpawnToken} className="flex-1 bg-indigo-700 hover:bg-indigo-600 py-2 rounded text-white font-bold transition uppercase text-xs">Drop on Grid</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ============================================================================
        // APP ENTRY
        // ============================================================================
        const App = () => {
            const [tab, setTab] = useState('lobby');
            const [roomConfig, setRoomConfig] = useState(null);

            const handleJoin = (code, user, isHost) => {
                setRoomConfig({ code, user, isHost });
                setTab('play');
            };

            const handleLeaveLobby = () => {
                setRoomConfig(null);
                setTab('lobby');
            }

            return (
                <GameProvider>
                    <div className="flex flex-col min-h-screen">
                        <header className="bg-stone-900 border-b border-stone-800 p-3 flex justify-between items-center px-6">
                            <h1 className="text-sm font-black tracking-widest text-amber-500 uppercase">GoldBurn <span className="text-stone-500 text-[9px] ml-1">TEST</span></h1>
                            {(tab === 'lobby' || tab === 'forge') && (
                                <nav className="flex gap-2">
                                    <button onClick={()=>setTab('lobby')} className={`text-xs px-4 py-1.5 rounded font-bold uppercase tracking-wider transition ${tab==='lobby'?'bg-stone-800 text-stone-200':'text-stone-500 hover:text-stone-300'}`}>Play</button>
                                    <button onClick={()=>setTab('forge')} className={`text-xs px-4 py-1.5 rounded font-bold uppercase tracking-wider transition ${tab==='forge'?'bg-stone-800 text-stone-200':'text-stone-500 hover:text-stone-300'}`}>Deck Builder</button>
                                </nav>
                            )}
                        </header>
                        
                        <main className="flex-1 overflow-hidden">
                            {tab === 'forge' && <DeckBuilder onTestDeck={() => setTab('solo_test')} />}
                            {tab === 'lobby' && <Lobby onJoin={handleJoin} />}
                            {tab === 'play' && (
                                <GameContext.Consumer>
                                    {({ customDeck }) => <SandboxBoard roomCode={roomConfig.code} username={roomConfig.user} isHost={roomConfig.isHost} customDeck={customDeck} onLeaveLobby={handleLeaveLobby} />}
                                </GameContext.Consumer>
                            )}
                            {tab === 'solo_test' && (
                                <GameContext.Consumer>
                                    {({ customDeck }) => <SandboxBoard roomCode="TEST-ENV" username="Deck Tester" isHost={true} customDeck={customDeck} onLeaveLobby={()=>setTab('forge')} isSoloTest={true} />}
                                </GameContext.Consumer>
                            )}
                        </main>
                    </div>
                </GameProvider>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
