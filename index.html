<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoldBurn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0f0a0a; }
        ::-webkit-scrollbar-thumb { background: #451a1a; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #7f2d2d; }
    </style>
</head>
<body class="bg-stone-950 text-stone-100 min-h-screen font-serif selection:bg-amber-800 selection:text-amber-100">

    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo, createContext, useContext } from 'https://esm.sh/react@18.2.0';
        import ReactDOM from 'https://esm.sh/react-dom@18.2.0/client';

        // ============================================================================
        // BA Test CARD DATABASE
        // ============================================================================
        const MASTER_CARDS = [
            { id: 'heart_soul', name: 'Heart and Soul', type: 'Vital', limit: 1, hp: 20, cost: 0, set: 'Core', image: 'Heart&Soul.png', description: 'Can make up to three actions per turn. Unaffected by move effects.' },
            { id: 'TEST', name: 'TEST', type: 'TEST', limit: 3, hp: 20, cost: 0, set: 'TEST', image: 'TEST.png', description: 'TESTTESTTESTTEST.' },
            { id: 'bandit', name: 'Bandit', type: 'Troop', limit: 3, hp: 3, cost: 3, set: 'Bandits Arrival', image: 'Bandit.png', description: 'Slash (0): Deal 3 dmg. Knife Toss (2): Deal 3 dmg.' },
            { id: 'death_toll', name: 'Death Toll', type: 'Act (Fast)', limit: 3, cost: 3, set: 'Bandits Arrival', image: 'DeathToll.png', description: 'This turn, whenever a troop your opponent controls is destroyed, you gain 2 gold.' },
            { id: 'bandit_checkpoint', name: 'Bandit Checkpoint', type: 'Zone', limit: 3, cost: 0, set: 'Bandits Arrival', image: 'BanditCheckpoint.png', description: 'Every time your opponent summons a troop, you gain 1 gold.' },
            { id: 'engrave_engrave', name: 'Engrave Engrave', type: 'Act (Slow)', limit: 3, cost: 2, set: 'Bandits Arrival', image: 'engraveEngrave.png', description: 'Target a card in either graveyard; expel it.' },
            { id: 'vacation_abyss', name: 'Vacation in the Abyss', type: 'Act (Fast)', limit: 3, cost: 3, set: 'Bandits Arrival', image: 'VayCayinAbyss.png', description: 'Target a non-vital troop on the field; It is expelled until the end of the turn.' },
            { id: 'locust_swarm', name: 'Locust Swarm', type: 'Act (Slow)', limit: 3, cost: 4, set: 'Bandits Arrival', image: 'LocustSwarm.png', description: 'All of your opponent’s troops gain 3 poison counters (remove 1 counter at the end of each turn, deal 1 dmg.)' },
            { id: 'meat_hook', name: 'Meat Hook', type: 'Troop', limit: 3, hp: 3, cost: 3, set: 'Bandits Arrival', image: 'MeatHook.png', description: 'Hook Shot (3)- Deal 2 dmg, target is moved up 1, and cannot move or be moved until the end of the next turn. "Rest assured, it is a moving experience."' },
            { id: 'noble_sacrifice', name: 'Noble Sacrifice', type: 'Act (Slow)', limit: 3, cost: 2, set: 'Bandits Arrival', image: 'NobleSac.png', description: 'Destroy target non-vital card you control, and if you do, destroy target non-vital card your opponent controls.' },
            { id: 'nobles_sacrifice', name: "Noble's Sacrifice", type: 'Act (Fast)', limit: 3, cost: 5, set: 'Bandits Arrival', image: 'NoblesSac.png', description: 'Destroy a non-vital troop your opponent controls.' },
            { id: 'reaper_wealth', name: 'Reaper of Wealth', type: 'Troop', limit: 3, hp: 3, cost: 2, set: 'Bandits Arrival', image: 'ReapofWealth.png', description: 'If reaper of wealth destroys an opponent’s troop, gain 2 gold. Tax Life Force (2)- deal 2 dmg. Just like the Ferryman.' },
            { id: 'reject_mortality', name: 'Reject Mortality', type: 'Act (Slow)', limit: 3, cost: 6, set: 'Bandits Arrival', image: 'RejectMortality.png', description: 'Resurrect a troop from your graveyard.' },
            { id: 'temporary_treaty', name: 'Temporary Treaty', type: 'Act (Slow)', limit: 3, cost: 5, set: 'Bandits Arrival', image: 'TempTreaty.png', description: 'Until the end of the next turn, neither player can make actions or activate cards that would deal dmg to another card.' },
            { id: 'thief_thievery', name: 'Thief of Thievery', type: 'Troop', limit: 3, hp: 1, cost: 3, set: 'Bandits Arrival', image: 'TheifofTheif.png', description: 'That Thief’s Thievery (0)- your opponent loses 2 gold, you gain 2 gold. "No ma’am this is MY wallet."' },
            { id: 'goobis', name: 'Goobis', type: 'Troop', limit: 3, hp: 4, cost: 4, set: 'Core', image: 'Goobis.png', description: 'Gindle (0)- Heal 4. Skimble (5)- target a troop in your graveyard; resurrect that target. "Triangle."' },
            { id: 'bandit_territory', name: 'Bandit Territory', type: 'Zone', limit: 3, cost: 0, set: 'Bandits Arrival', image: 'BanditTerritory.png', description: 'When this zone is activated: You can add 1 "bandit" card from your deck to your hand.' },
            { id: 'bandit_widowmaker', name: 'Bandit Widowmaker', type: 'Troop', limit: 3, hp: 7, cost: 5, set: 'Bandits Arrival', image: 'BanditWindowmaker.png', description: 'Slay (1)- Deal 5 dmg. Bounty (2)- Deal 3 dmg. if this move destroys an enemy, gain 3 gold.' },
            { id: 'dark_inviter', name: 'Dark Inviter', type: 'Troop', limit: 3, hp: 1, cost: 3, set: 'Core', image: 'DarkInviter.png', description: 'When this troop attacks or is attacked by a non-vital card: you can expel both cards. journey to the abyss (1)- deal 1 dmg. The abyss returns even the boldest gaze' },
            { id: 'defenders_instinct', name: 'Defenders Instinct', type: 'Act (Fast)', limit: 3, cost: 2, set: 'Core', image: 'DefendersInstinct.png', description: 'When your opponent uses a move that would deal damage to a troop your control: you can redirect that damage to another card you control.' },
            { id: 'deus_hexer', name: 'Deus Hexer', type: 'Troop', limit: 3, hp: 3, cost: 5, set: 'Core', image: 'DeusHexer.png', description: 'When a vital troop you control takes damage, you can summon this card from your hand for no cost. Hex (0)- deal 2 dmg' },
            { id: 'the_gold_mine', name: 'The Gold Mine', type: 'Building', limit: 3, hp: 10, cost: 4, set: 'Core', image: 'GoldMine.png', description: 'When this card is destroyed, gain gold equal to the amount of gold tokens that were on this card. Gold Rush (0)- place 2 gold tokens on this card. "A little blacklung never hurt anyone." -last words of an underpaid miner' },
            { id: 'watch_tower', name: 'Watch Tower', type: 'Building', limit: 3, hp: 5, cost: 4, set: 'Core', image: 'WatchTower.png', description: 'Your troops can make the move action in addition to their regular action. Arrows (1)- deal 1 dmg. "At least we know we’ll always have someone watching."' },
            { id: 'bandit_archer', name: 'Bandit Archer', type: 'Troop', limit: 3, hp: 4, cost: 2, set: 'Bandits Arrival', image: 'BanditArcher.png', description: 'Pelt (1)- Deal 2 damage' },
            { id: 'bandit_artillery', name: 'Bandit Artillery', type: 'Troop', limit: 3, hp: 5, cost: 5, set: 'Bandits Arrival', image: 'BanditArtillery.png', description: 'Blast (2)- Deal 5 dmg. Gunpowder Rain (3)- Deal 3 dmg. "The smell of sulfur and gunpowder hangs in the air. The war machine is close."' },
            { id: 'bandit_captain', name: 'Bandit Captain', type: 'Troop', limit: 3, hp: 8, cost: 6, set: 'Bandits Arrival', image: 'BanditCaptain.png', description: 'Other bandits you control deal +1 damage with all of their attacks. Dexterous Strike (2)- Deal 4 dmg to up to two seperate targets' }
        ];

        const STARTER_DECKS = {
            "test1": { 'heart_soul': 1, 'TEST': 3 },
            "Bandits Arrival Starter": {
                'heart_soul': 1, 'engrave_engrave': 1, 'defenders_instinct': 1, 'death_toll': 1,
                'nobles_sacrifice': 1, 'vacation_abyss': 1, 'locust_swarm': 1, 'reject_mortality': 1,
                'temporary_treaty': 1, 'noble_sacrifice': 1, 'thief_thievery': 1, 'meat_hook': 1,
                'bandit': 3, 'bandit_archer': 2, 'bandit_widowmaker': 2, 'reaper_wealth': 2,
                'dark_inviter': 1, 'bandit_captain': 2, 'bandit_artillery': 1, 'goobis': 1,
                'deus_hexer': 1, 'watch_tower': 1, 'the_gold_mine': 1, 'bandit_territory': 1, 'bandit_checkpoint': 1
            }
        };

        const MARKER_COLORS = [
            { bg: '#ef4444', name: 'Red' },
            { bg: '#22c55e', name: 'Green' },
            { bg: '#3b82f6', name: 'Blue' },
            { bg: '#a855f7', name: 'Purple' },
            { bg: '#eab308', name: 'Yellow' }
        ];

        const GameContext = createContext();

        const GameProvider = ({ children }) => {
            const [customDeck, setCustomDeck] = useState(() => {
                const stored = localStorage.getItem('v1_saved_deck');
                if (stored) {
                    const parsed = JSON.parse(stored);
                    const cleaned = {};
                    for (const key in parsed) if (MASTER_CARDS.find(c => c.id === key)) cleaned[key] = parsed[key];
                    return cleaned;
                }
                return STARTER_DECKS["Bandits Arrival Starter"];
            });

            const updateDeckQty = (id, amount) => {
                setCustomDeck(prev => {
                    const cardDef = MASTER_CARDS.find(c => c.id === id);
                    const limit = cardDef.limit !== undefined ? cardDef.limit : 3;
                    const currentQty = prev[id] || 0;
                    
                    let nextQty = currentQty + amount;
                    nextQty = Math.max(0, Math.min(nextQty, limit));

                    const next = { ...prev, [id]: nextQty };
                    if (next[id] === 0) delete next[id];
                    localStorage.setItem('v1_saved_deck', JSON.stringify(next));
                    return next;
                });
            };

            const loadEntireDeck = (deckObj) => {
                const cleaned = {};
                for (const key in deckObj) {
                    const cardDef = MASTER_CARDS.find(c => c.id === key);
                    if (cardDef) {
                        const limit = cardDef.limit !== undefined ? cardDef.limit : 3;
                        cleaned[key] = Math.min(deckObj[key], limit); 
                    }
                }
                setCustomDeck(cleaned);
                localStorage.setItem('v1_saved_deck', JSON.stringify(cleaned));
            };

            return (
                <GameContext.Provider value={{ customDeck, updateDeckQty, loadEntireDeck }}>
                    {children}
                </GameContext.Provider>
            );
        };

        // ============================================================================
        // DECK BUILDER (FORGE)
        // ============================================================================
        const DeckBuilder = ({ onTestDeck }) => {
            const { customDeck, updateDeckQty, loadEntireDeck } = useContext(GameContext);
            
            const [search, setSearch] = useState('');
            const [costFilter, setCostFilter] = useState('All');
            const [typeFilter, setTypeFilter] = useState('All');
            const [setFilter, setSetFilter] = useState('All');
            const [sortOrder, setSortOrder] = useState('A-Z');
            const [zoomedCard, setZoomedCard] = useState(null);

            const [selectedStarter, setSelectedStarter] = useState(Object.keys(STARTER_DECKS)[0]);
            const [importString, setImportString] = useState('');

            const uniqueTypes = [...new Set(MASTER_CARDS.map(c => c.type))].sort();
            const uniqueSets = [...new Set(MASTER_CARDS.map(c => c.set))].sort();

            const incCost = () => setCostFilter(prev => prev === 'All' ? 0 : prev + 1);
            const decCost = () => setCostFilter(prev => prev === 'All' ? 0 : Math.max(0, prev - 1));
            const clearCost = () => setCostFilter('All');

            const filteredCards = useMemo(() => {
                let result = MASTER_CARDS.filter(card => {
                    if (search && !card.name.toLowerCase().includes(search.toLowerCase())) return false;
                    if (costFilter !== 'All' && card.cost !== costFilter) return false;
                    if (typeFilter !== 'All' && card.type !== typeFilter) return false;
                    if (setFilter !== 'All' && card.set !== setFilter) return false;
                    return true;
                });
                result.sort((a, b) => {
                    if (sortOrder === 'A-Z') return a.name.localeCompare(b.name);
                    if (sortOrder === 'Z-A') return b.name.localeCompare(a.name);
                    return 0;
                });
                return result;
            }, [search, costFilter, typeFilter, setFilter, sortOrder]);

            const deckEntries = Object.entries(customDeck);
            const vitalEntries = deckEntries.filter(([id]) => MASTER_CARDS.find(c => c.id === id)?.type === 'Vital');
            const mainEntries = deckEntries.filter(([id]) => MASTER_CARDS.find(c => c.id === id)?.type !== 'Vital');
            const totalCount = mainEntries.reduce((acc, [_, qty]) => acc + qty, 0);

            const handleExport = () => {
                const dataStr = JSON.stringify(customDeck);
                navigator.clipboard.writeText(dataStr).then(() => {
                    alert("Deck code copied to clipboard!");
                }).catch(err => {
                    alert("Failed to copy. Here is your code:\n" + dataStr);
                });
            };

            const handleImport = () => {
                if(!importString.trim()) return;
                try {
                    const parsed = JSON.parse(importString);
                    loadEntireDeck(parsed);
                    setImportString('');
                    alert("Deck imported successfully!");
                } catch(e) {
                    alert("Invalid deck code format.");
                }
            };

            const handleLoadStarter = () => {
                const deckObj = STARTER_DECKS[selectedStarter];
                if (deckObj) {
                    if(window.confirm(`Are you sure you want to overwrite your current deck with the ${selectedStarter}?`)) {
                        loadEntireDeck(deckObj);
                    }
                }
            };

            return (
                <div className="grid grid-cols-1 xl:grid-cols-12 gap-6 p-6 max-w-[1500px] mx-auto">
                    {/* LEFT PANEL */}
                    <div className="xl:col-span-8 bg-stone-900 border border-amber-900/30 rounded-2xl p-5 shadow-2xl flex flex-col h-[750px]">
                        <div className="border-b border-stone-800 pb-4 mb-4">
                            <h2 className="text-lg font-bold text-amber-500 uppercase tracking-wide mb-3">Deck Builder</h2>
                            <div className="grid grid-cols-1 md:grid-cols-6 gap-3">
                                <input type="text" placeholder="Search by name..." value={search} onChange={(e)=>setSearch(e.target.value)} className="col-span-1 md:col-span-6 bg-stone-950 border border-stone-800 rounded px-3 py-1.5 text-stone-200 outline-none focus:border-amber-600 text-xs" />
                                <select value={sortOrder} onChange={(e)=>setSortOrder(e.target.value)} className="col-span-1 md:col-span-2 bg-stone-950 border border-stone-800 rounded px-2 py-1.5 text-stone-300 outline-none text-xs">
                                    <option value="A-Z">Sort: A - Z</option><option value="Z-A">Sort: Z - A</option>
                                </select>
                                <div className="col-span-1 md:col-span-2 flex items-center justify-between bg-stone-950 border border-stone-800 rounded px-2 py-1 text-xs">
                                    <span className="text-stone-400 font-bold">Cost:</span>
                                    <div className="flex items-center">
                                        <button onClick={decCost} className="bg-stone-800 hover:bg-stone-700 text-stone-200 w-5 h-5 rounded flex items-center justify-center">-</button>
                                        <span className="w-8 text-center text-amber-500 font-bold">{costFilter}</span>
                                        <button onClick={incCost} className="bg-stone-800 hover:bg-stone-700 text-stone-200 w-5 h-5 rounded flex items-center justify-center">+</button>
                                        {costFilter !== 'All' && <button onClick={clearCost} className="ml-2 text-rose-500 hover:text-rose-400 font-bold">X</button>}
                                    </div>
                                </div>
                                <select value={typeFilter} onChange={(e)=>setTypeFilter(e.target.value)} className="col-span-1 bg-stone-950 border border-stone-800 rounded px-2 py-1.5 text-stone-300 outline-none text-xs">
                                    <option value="All">All Types</option>{uniqueTypes.map(type => <option key={type} value={type}>{type}</option>)}
                                </select>
                                <select value={setFilter} onChange={(e)=>setSetFilter(e.target.value)} className="col-span-1 bg-stone-950 border border-stone-800 rounded px-2 py-1.5 text-stone-300 outline-none text-xs">
                                    <option value="All">All Sets</option>{uniqueSets.map(set => <option key={set} value={set}>{set}</option>)}
                                </select>
                            </div>
                        </div>

                        <div className="flex-1 overflow-y-auto pr-2 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3 content-start">
                            {filteredCards.map(card => {
                                const qty = customDeck[card.id] || 0;
                                const limit = card.limit !== undefined ? card.limit : 3;
                                const maxReached = qty >= limit;
                                return (
                                    <div key={card.id} className="bg-stone-950 border border-stone-850 p-3 rounded-xl flex flex-col hover:border-amber-900 transition h-48">
                                        <div className="shrink-0">
                                            <div className="flex justify-between items-start gap-2">
                                                <h4 className="font-bold text-stone-200 text-sm truncate">{card.name}</h4>
                                                <div className="flex items-center gap-2">
                                                    <button onClick={() => setZoomedCard(card)} className="text-stone-400 hover:text-amber-400 transition transform hover:scale-110" title="View Full Card">
                                                        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                                                    </button>
                                                    <span className="text-[10px] font-mono text-amber-500">{card.cost}G</span>
                                                </div>
                                            </div>
                                            <div className="flex justify-between items-center mt-1 pb-2 border-b border-stone-900">
                                                <span className="text-[9px] uppercase text-stone-500">{card.type} • {card.set}</span>
                                                <span className="text-[8px] text-stone-600 font-mono">Limit: {limit}</span>
                                            </div>
                                        </div>
                                        <div className="flex-1 overflow-y-auto my-2 pr-1">
                                            <p className="text-[11px] text-stone-400 italic leading-snug">{card.description}</p>
                                        </div>
                                        <div className="shrink-0 flex items-center justify-between border-t border-stone-900 pt-2">
                                            <span className="text-xs text-stone-500">In Deck: <b className="text-amber-500">{qty}</b></span>
                                            <div className="flex gap-1">
                                                <button onClick={() => updateDeckQty(card.id, -1)} className="w-6 h-6 bg-stone-900 hover:bg-stone-800 text-stone-300 rounded transition">-</button>
                                                <button onClick={() => !maxReached && updateDeckQty(card.id, 1)} className={`w-6 h-6 rounded transition ${maxReached ? 'bg-stone-900 text-stone-700 cursor-not-allowed' : 'bg-amber-900/40 hover:bg-amber-900/70 text-amber-400'}`}>+</button>
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {/* RIGHT PANEL */}
                    <div className="xl:col-span-4 flex flex-col gap-4 h-[750px]">
                        <div className="bg-stone-900 border border-amber-900/30 rounded-2xl p-5 shadow-2xl flex flex-col flex-1 min-h-0">
                            <div className="border-b border-stone-800 pb-3 mb-3 flex justify-between items-center">
                                <h3 className="text-sm font-bold text-stone-300 uppercase tracking-widest">Deck List</h3>
                                <span className="text-[10px] font-mono font-black text-amber-400 bg-amber-950/30 border border-amber-900/50 px-2 py-1 rounded">{totalCount} Cards</span>
                            </div>
                            <div className="flex-1 overflow-y-auto space-y-4 pr-1">
                                <div>
                                    <span className="text-[9px] uppercase tracking-widest text-stone-500 font-bold block mb-1">Vital Card (Not Counted)</span>
                                    <div className="space-y-1.5">
                                        {vitalEntries.length > 0 ? vitalEntries.map(([id, qty]) => {
                                            const c = MASTER_CARDS.find(x => x.id === id);
                                            return c ? (
                                                <div key={id} className="bg-stone-950 border border-stone-800 px-3 py-2 rounded-xl flex justify-between items-center group">
                                                    <div>
                                                        <div className="text-xs font-bold text-stone-200">{c.name}</div>
                                                        <div className="text-[9px] text-amber-500">{c.type}</div>
                                                    </div>
                                                    <div className="flex items-center gap-3">
                                                        <span className="text-xs text-amber-500 font-bold">x{qty}</span>
                                                        <button onClick={() => updateDeckQty(id, -1)} className="text-rose-500 opacity-0 group-hover:opacity-100 transition text-[10px] font-bold">Drop</button>
                                                    </div>
                                                </div>
                                            ) : null;
                                        }) : <div className="text-[10px] italic text-rose-500/70 py-1">Missing a Vital card!</div>}
                                    </div>
                                </div>
                                <div>
                                    <span className="text-[9px] uppercase tracking-widest text-stone-500 font-bold block mb-1 border-t border-stone-800 pt-2">Main Forces</span>
                                    <div className="space-y-1.5">
                                        {mainEntries.map(([id, qty]) => {
                                            const c = MASTER_CARDS.find(x => x.id === id);
                                            return c ? (
                                                <div key={id} className="bg-stone-950 border border-stone-850 px-3 py-2 rounded-xl flex justify-between items-center group">
                                                    <div>
                                                        <div className="text-xs font-bold text-stone-300">{c.name}</div>
                                                        <div className="text-[9px] text-stone-500">{c.type}</div>
                                                    </div>
                                                    <div className="flex items-center gap-3">
                                                        <span className="text-xs text-amber-500 font-bold">x{qty}</span>
                                                        <button onClick={() => updateDeckQty(id, -1)} className="text-rose-500 opacity-0 group-hover:opacity-100 transition text-[10px] font-bold">Drop</button>
                                                    </div>
                                                </div>
                                            ) : null;
                                        })}
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="bg-stone-900 border border-stone-800 rounded-2xl p-4 shadow-xl shrink-0 flex flex-col gap-3">
                            <div>
                                <span className="text-[9px] uppercase tracking-widest text-stone-500 font-bold block mb-2">Deck Manager</span>
                                <div className="flex gap-2 mb-3">
                                    <select value={selectedStarter} onChange={(e)=>setSelectedStarter(e.target.value)} className="flex-1 bg-stone-950 border border-stone-800 rounded px-2 text-[10px] text-stone-300 outline-none">
                                        {Object.keys(STARTER_DECKS).map(name => <option key={name} value={name}>{name}</option>)}
                                    </select>
                                    <button onClick={handleLoadStarter} className="bg-amber-900/30 hover:bg-amber-900/60 text-amber-500 border border-amber-900/50 rounded px-3 py-1.5 text-[10px] font-bold uppercase transition">Load</button>
                                </div>
                                <div className="border-t border-stone-800 pt-3">
                                    <button onClick={handleExport} className="w-full mb-2 bg-stone-800 hover:bg-stone-700 text-stone-300 rounded px-3 py-1.5 text-[10px] font-bold uppercase transition border border-stone-700">Export Deck to Clipboard</button>
                                    <div className="flex gap-2">
                                        <input type="text" value={importString} onChange={(e)=>setImportString(e.target.value)} placeholder="Paste deck code..." className="flex-1 bg-stone-950 border border-stone-800 rounded px-2 py-1.5 text-[10px] text-stone-200 outline-none focus:border-indigo-600" />
                                        <button onClick={handleImport} className="bg-indigo-900/30 hover:bg-indigo-900/60 text-indigo-400 border border-indigo-900/50 rounded px-3 py-1.5 text-[10px] font-bold uppercase transition">Import</button>
                                    </div>
                                </div>
                            </div>
                            
                            <div className="border-t border-stone-800 pt-3">
                                <button onClick={onTestDeck} className="w-full bg-emerald-900/40 hover:bg-emerald-900/70 text-emerald-400 border border-emerald-700/50 rounded py-3 text-xs font-black uppercase tracking-widest transition flex items-center justify-center gap-2">
                                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                                    Test Deck in Sandbox
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* ZOOM MODAL */}
                    {zoomedCard && (
                        <div className="fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4 backdrop-blur-sm" onClick={() => setZoomedCard(null)}>
                            <div className="w-[300px] h-[420px] sm:w-[400px] sm:h-[560px] relative rounded-2xl overflow-hidden shadow-2xl border-2 border-amber-700" onClick={e => e.stopPropagation()}>
                                {zoomedCard.image ? (
                                     <img src={zoomedCard.image} alt={zoomedCard.name} className="w-full h-full object-cover" />
                                ) : (
                                     <div className="flex flex-col items-center justify-center h-full bg-stone-800 text-stone-200 p-6 text-center border-4 border-stone-900">
                                         <h2 className="text-3xl font-bold mb-4 text-amber-500">{zoomedCard.name}</h2>
                                         <p className="text-stone-400 italic text-sm">{zoomedCard.description}</p>
                                     </div>
                                )}
                                <button onClick={() => setZoomedCard(null)} className="absolute top-3 right-3 bg-stone-900/80 text-white rounded-full w-8 h-8 flex items-center justify-center hover:bg-rose-600 border border-stone-700 transition">X</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ============================================================================
        // MULTIPLAYER LOBBY
        // ============================================================================
        const Lobby = ({ onJoin }) => {
            const [username, setUsername] = useState('');
            const [roomCode, setRoomCode] = useState('');

            return (
                <div className="max-w-md mx-auto mt-20 bg-stone-900 border border-amber-900/30 rounded-2xl p-6 shadow-2xl text-center">
                    <h1 className="text-2xl font-black text-amber-500 uppercase tracking-widest mb-1">GoldBurn Test</h1>
                    <p className="text-xs text-stone-400 mb-6">This is a test so expect errors and stuff like that.</p>
                    
                    <div className="space-y-4 text-left">
                        <div>
                            <label className="text-[10px] font-bold text-stone-500 uppercase">Username</label>
                            <input type="text" value={username} onChange={e=>setUsername(e.target.value)} className="w-full bg-stone-950 border border-stone-800 rounded px-3 py-2 text-stone-200 outline-none focus:border-amber-600" placeholder="Example: aviyarn" />
                        </div>
                        <div>
                            <label className="text-[10px] font-bold text-stone-500 uppercase">Room Code</label>
                            <input type="text" value={roomCode} onChange={e=>setRoomCode(e.target.value)} className="w-full bg-stone-950 border border-stone-800 rounded px-3 py-2 text-amber-500 uppercase outline-none focus:border-amber-600" placeholder="Leave blank to Create" />
                        </div>
                        <button onClick={() => onJoin(roomCode || Math.random().toString(36).substring(2,6).toUpperCase(), username || 'Duelist', !roomCode)} className="w-full bg-gradient-to-r from-amber-800 to-amber-950 text-amber-100 font-bold uppercase py-3 rounded-lg text-xs hover:brightness-110 border border-amber-700/50 transition">
                            {roomCode ? 'Join Match' : 'Create Match'}
                        </button>
                    </div>
                </div>
            );
        };

        // ============================================================================
        // v1 SANDBOX BOARD
        // ============================================================================
        const SandboxBoard = ({ roomCode, username, isHost, customDeck, onLeaveLobby, isSoloTest = false }) => {
            const [peer, setPeer] = useState(null);
            const [conn, setConn] = useState(null);
            const [connected, setConnected] = useState(false);
            
            const [setupPhase, setSetupPhase] = useState(true);
            const [myVitalPos, setMyVitalPos] = useState(null);
            const [myVitalLocked, setMyVitalLocked] = useState(false);
            const [oppVitalLocked, setOppVitalLocked] = useState(false);
            const [vitalCardInst, setVitalCardInst] = useState(null);

            const [gold, setGold] = useState(isHost ? 3 : 0);
            const [deck, setDeck] = useState([]);
            const [hand, setHand] = useState([]);
            const [grave, setGrave] = useState([]);
            const [voidZone, setVoidZone] = useState([]);
            const [myGrid, setMyGrid] = useState([ [null, null, null], [null, null, null] ]);
            const [actSlot, setActSlot] = useState(null);

            const [oppGold, setOppGold] = useState(isHost ? 0 : 3);
            const [oppHandCount, setOppHandCount] = useState(5);
            const [oppDeckCount, setOppDeckCount] = useState(0);
            const [oppGrave, setOppGrave] = useState([]);
            const [oppVoid, setOppVoid] = useState([]);
            const [oppGrid, setOppGrid] = useState([ [null, null, null], [null, null, null] ]);
            const [oppActSlot, setOppActSlot] = useState(null);

            const [sharedZone, setSharedZone] = useState(null); 
            const [logs, setLogs] = useState([]);
            
            const [selectedHandIdx, setSelectedHandIdx] = useState(null);
            const [inspectedCard, setInspectedCard] = useState(null);
            const [isInspectorOpen, setIsInspectorOpen] = useState(true);
            const [showMarkersUI, setShowMarkersUI] = useState(false);
            const [diceType, setDiceType] = useState('6');

            const [viewModal, setViewModal] = useState({ isOpen: false, title: '', cards: [], type: null, onSelect: null });
            const [activeMenu, setActiveMenu] = useState(null);
            const [zoomedCard, setZoomedCard] = useState(null);
            const [modalSelectedIdx, setModalSelectedIdx] = useState(null);
            const [movingCard, setMovingCard] = useState(null); // stores {r, c, type} of the field card being moved

            useEffect(() => {
                let generatedDeck = [];
                Object.entries(customDeck).forEach(([id, qty]) => {
                    if (id === 'heart_soul') return; 
                    const card = MASTER_CARDS.find(c => c.id === id);
                    if(card) {
                        for(let i=0; i<qty; i++) generatedDeck.push({ ...card, instanceId: Math.random().toString(36).substr(2,9), currentHp: card.hp });
                    }
                });
                generatedDeck.sort(() => Math.random() - 0.5);

                const vitalDef = MASTER_CARDS.find(c => c.type === 'Vital');
                if (vitalDef && customDeck['heart_soul']) {
                    setVitalCardInst({ ...vitalDef, instanceId: 'vital_1', currentHp: vitalDef.hp });
                }

                const startingHand = generatedDeck.splice(0, 5);
                setDeck(generatedDeck);
                setHand(startingHand);
                
                if (isSoloTest) {
                    setConnected(true);
                    setOppVitalLocked(true);
                    addLog("Offline Sandbox Mode initialized. Testing your deck layout.");
                } else {
                    addLog(`Game Engine v1 Initialized. ${isHost ? 'You go first (3 Gold).' : 'You go second (0 Gold).'}`);
                }
            }, []);

            useEffect(() => {
                if (isSoloTest) return;
                const p = new Peer(isHost ? `v1-${roomCode}` : null);
                p.on('open', id => {
                    if (!isHost) {
                        const c = p.connect(`v1-${roomCode}`);
                        setupConnection(c);
                    }
                });
                p.on('connection', c => setupConnection(c));
                setPeer(p);
                return () => p.destroy();
            }, []);

            useEffect(() => {
                if (myVitalLocked && oppVitalLocked) {
                    setSetupPhase(false);
                    if (!isSoloTest) addLog("Both players have positioned their Vitals. Combat begins now!", false);
                }
            }, [myVitalLocked, oppVitalLocked, isSoloTest]);

            useEffect(() => {
                if (conn && connected && !setupPhase && !isSoloTest) {
                    conn.send({ type: 'SYNC_COUNTS', hand: hand.length, deck: deck.length, grave: grave, voidZone: voidZone });
                }
            }, [hand, deck, grave, voidZone, connected, setupPhase, isSoloTest, conn]);

            const setupConnection = (c) => {
                setConn(c);
                c.on('open', () => {
                    setConnected(true);
                    addLog("Opponent Connected!");
                    c.send({ type: 'SYNC_GOLD', gold: isHost ? 3 : 0 });
                });
                c.on('data', data => {
                    if (data.type === 'LOG') setLogs(prev => [data.msg, ...prev]);
                    if (data.type === 'SYNC_GOLD') setOppGold(data.gold);
                    if (data.type === 'SYNC_GRID') setOppGrid(data.grid);
                    if (data.type === 'SYNC_ZONE') setSharedZone(data.zone);
                    if (data.type === 'SYNC_ACT') setOppActSlot(data.act);
                    if (data.type === 'SYNC_COUNTS') {
                        setOppHandCount(data.hand);
                        setOppDeckCount(data.deck);
                        setOppGrave(data.grave);
                        setOppVoid(data.voidZone);
                    }
                    if (data.type === 'VITAL_LOCKED') {
                        setOppVitalLocked(true);
                        let newOppGrid = [...oppGrid];
                        newOppGrid[data.pos.r] = [...newOppGrid[data.pos.r]];
                        newOppGrid[data.pos.r][data.pos.c] = data.card;
                        setOppGrid(newOppGrid);
                    }
                    if (data.type === 'CONCEDE') {
                        alert("🎉 You Win! Your opponent has conceded the match.");
                        onLeaveLobby(); 
                    }
                });
            };

            const addLog = (msg, broadcast = false) => {
                const formatted = `[${new Date().toLocaleTimeString()}] ${msg}`;
                setLogs(prev => [formatted, ...prev]);
                if (broadcast && conn && !isSoloTest) conn.send({ type: 'LOG', msg: formatted });
            };

            const broadcastGrid = (newGrid) => { setMyGrid(newGrid); if(conn && !isSoloTest) conn.send({ type: 'SYNC_GRID', grid: newGrid }); };
            const broadcastZone = (card) => { setSharedZone(card); if(conn && !isSoloTest) conn.send({ type: 'SYNC_ZONE', zone: card }); };
            const broadcastAct = (card) => { setActSlot(card); if(conn && !isSoloTest) conn.send({ type: 'SYNC_ACT', act: card }); };

            const handleConcede = () => {
                if (isSoloTest) {
                    onLeaveLobby();
                    return;
                }
                if(window.confirm("Are you sure you want to concede? You will lose the match.")) {
                    if(conn) conn.send({ type: 'CONCEDE' });
                    alert("You have conceded the match.");
                    onLeaveLobby(); 
                }
            };

            const lockVitalPlacement = () => {
                if (!myVitalPos) return alert("Select a grid space to place your Vital!");
                setMyVitalLocked(true);
                
                let newMyGrid = [...myGrid];
                newMyGrid[myVitalPos.r] = [...newMyGrid[myVitalPos.r]];
                newMyGrid[myVitalPos.r][myVitalPos.c] = vitalCardInst;
                setMyGrid(newMyGrid);
                
                if (conn && !isSoloTest) conn.send({ type: 'VITAL_LOCKED', pos: myVitalPos, card: vitalCardInst });
                addLog(`${username} deployed their Vital card to the grid.`, true);
            };

            const modifyGold = (amt) => {
                const newGold = Math.max(0, gold + amt);
                setGold(newGold);
                if(conn && !isSoloTest) conn.send({ type: 'SYNC_GOLD', gold: newGold });
                addLog(`${username} ${amt > 0 ? 'gained' : 'spent'} ${Math.abs(amt)} Gold.`, true);
            };

            const executeRoll = () => {
                if (diceType === 'coin') {
                    const res = Math.random() < 0.5 ? 'Heads' : 'Tails';
                    addLog(`${username} flipped a coin: [ ${res} ]`, true);
                } else {
                    const sides = parseInt(diceType);
                    const res = Math.floor(Math.random() * sides) + 1;
                    addLog(`${username} rolled a D${sides} and got: [ ${res} ]`, true);
                }
            };

            const drawFromDeck = () => {
                if (deck.length === 0) return;
                const d = [...deck];
                const card = d.pop();
                setDeck(d);
                setHand([...hand, card]);
                addLog(`${username} drew a card.`, true);
            };

            const searchDeckDraw = (realIdx) => {
                const d = [...deck];
                const card = d.splice(realIdx, 1)[0];
                setDeck(d);
                setHand([...hand, card]);
                setViewModal({ isOpen: false });
                addLog(`${username} searched their deck and drew a card.`, true);
            };

            const openViewer = (title, cards, type, selectable = false) => {
                setModalSelectedIdx(null);
                setViewModal({
                    isOpen: true,
                    title: title,
                    cards: cards,
                    type: type,
                    onSelect: selectable ? searchDeckDraw : null
                });
            };

            const moveFromPile = (source, idx, dest) => {
                let card;
                let newSourcePile;
                if (source === 'myGrave') {
                    newSourcePile = [...grave];
                    card = newSourcePile.splice(idx, 1)[0];
                    setGrave(newSourcePile);
                } else if (source === 'myVoid') {
                    newSourcePile = [...voidZone];
                    card = newSourcePile.splice(idx, 1)[0];
                    setVoidZone(newSourcePile);
                }

                setViewModal(prev => ({...prev, cards: newSourcePile}));

                if (dest === 'hand') {
                    setHand([...hand, card]);
                    addLog(`${username} recovered ${card.name} to their hand.`, true);
                } else if (dest === 'void') {
                    setVoidZone([card, ...voidZone]);
                    addLog(`${username} expelled ${card.name} to the Void.`, true);
                } else if (dest === 'grave') {
                    setGrave([card, ...grave]);
                    addLog(`${username} returned ${card.name} to the Graveyard.`, true);
                }
                setModalSelectedIdx(null);
            };

            // Global updater for cards you control on the field
            const updateMyCard = (instanceId, updater) => {
                let updatedCard = null;
                let newGrid = myGrid.map(row => row.map(c => {
                    if(c?.instanceId === instanceId) { updatedCard = updater(c); return updatedCard; }
                    return c;
                }));
                if (updatedCard) {
                    broadcastGrid(newGrid);
                    if(inspectedCard?.instanceId === instanceId) setInspectedCard(updatedCard);
                    return;
                }

                if (actSlot?.instanceId === instanceId) {
                    updatedCard = updater(actSlot);
                    broadcastAct(updatedCard);
                    if(inspectedCard?.instanceId === instanceId) setInspectedCard(updatedCard);
                    return;
                }
                
                if (sharedZone?.instanceId === instanceId) {
                    updatedCard = updater(sharedZone);
                    broadcastZone(updatedCard);
                    if(inspectedCard?.instanceId === instanceId) setInspectedCard(updatedCard);
                    return;
                }
            };

            const executeMove = (newR, newC) => {
                if (!movingCard || movingCard.type !== 'grid') return;
                const { r: oldR, c: oldC } = movingCard;
                
                let newGrid = [...myGrid];
                const cardToMove = newGrid[oldR][oldC];
                
                newGrid[oldR] = [...newGrid[oldR]];
                newGrid[oldR][oldC] = null;
                
                newGrid[newR] = [...newGrid[newR]];
                newGrid[newR][newC] = cardToMove;
                
                broadcastGrid(newGrid);
                setMovingCard(null);
                addLog(`${username} moved ${cardToMove.name} to a new position.`, true);
            };

            const placeToGrid = (r, c) => {
                if (selectedHandIdx === null) return;
                const card = hand[selectedHandIdx];
                if (card.type.includes('Act') || card.type === 'Zone') return alert("Acts and Zones have specific slots in the middle!");
                
                let newGrid = [...myGrid];
                newGrid[r] = [...newGrid[r]];
                newGrid[r][c] = card;
                
                let newHand = [...hand];
                newHand.splice(selectedHandIdx, 1);
                
                setHand(newHand);
                setSelectedHandIdx(null);
                broadcastGrid(newGrid);
                addLog(`${username} deployed ${card.name} to an Empty Space.`, true);
            };

            const placeToZone = () => {
                if (selectedHandIdx === null) return;
                const card = hand[selectedHandIdx];
                if (card.type !== 'Zone') return;
                let newHand = [...hand];
                newHand.splice(selectedHandIdx, 1);
                setHand(newHand);
                setSelectedHandIdx(null);
                broadcastZone(card);
                addLog(`${username} established a new Zone: ${card.name}.`, true);
            };

            const placeToAct = () => {
                if (selectedHandIdx === null) return;
                const card = hand[selectedHandIdx];
                if (!card.type.includes('Act')) return;
                let newHand = [...hand];
                newHand.splice(selectedHandIdx, 1);
                setHand(newHand);
                setSelectedHandIdx(null);
                broadcastAct(card);
                addLog(`${username} played ${card.type}: ${card.name}.`, true);
            };

            const modifyHealth = (r, c, amt) => {
                updateMyCard(myGrid[r][c].instanceId, card => ({ ...card, currentHp: card.currentHp + amt }));
            };

            const toggleActionUsed = (instanceId) => {
                updateMyCard(instanceId, card => ({ ...card, actionUsed: !card.actionUsed }));
            };

            const clearAllActions = () => {
                let newGrid = myGrid.map(row => row.map(c => c ? {...c, actionUsed: false} : c));
                broadcastGrid(newGrid);
                if (actSlot) broadcastAct({...actSlot, actionUsed: false});
                addLog(`${username} refreshed all their action points.`, true);
            };

            const addMarker = (colorHex, delta) => {
                if(!inspectedCard) return;
                updateMyCard(inspectedCard.instanceId, card => {
                    const currentCount = card.markers?.[colorHex] || 0;
                    return {
                        ...card, 
                        markers: { ...(card.markers || {}), [colorHex]: Math.max(0, currentCount + delta) }
                    };
                });
            };

            const sendFieldCardAway = (type, dest, r=0, c=0) => {
                let card;
                if (type === 'grid') {
                    card = myGrid[r][c];
                    let newGrid = [...myGrid];
                    newGrid[r] = [...newGrid[r]];
                    newGrid[r][c] = null;
                    broadcastGrid(newGrid);
                } else if (type === 'act') {
                    card = actSlot;
                    broadcastAct(null);
                } else if (type === 'zone') {
                    card = sharedZone;
                    broadcastZone(null);
                }
                
                // Strip markers and action status before entering pile
                card = { ...card, markers: {}, actionUsed: false };

                if (dest === 'grave') {
                    setGrave([card, ...grave]);
                    addLog(`${username} sent ${card.name} to the Graveyard.`, true);
                } else if (dest === 'void') {
                    setVoidZone([card, ...voidZone]);
                    addLog(`${username} exiled ${card.name} to the Void.`, true);
                }
                setActiveMenu(null);
            };

            const sendHandCardAway = (idx, dest) => {
                const card = hand[idx];
                let newHand = [...hand];
                newHand.splice(idx, 1);
                setHand(newHand);
                setSelectedHandIdx(null);

                if (dest === 'grave') {
                    setGrave([card, ...grave]);
                    addLog(`${username} discarded ${card.name} to the Graveyard.`, true);
                } else if (dest === 'void') {
                    setVoidZone([card, ...voidZone]);
                    addLog(`${username} exiled ${card.name} from hand to the Void.`, true);
                }
            };

            const isMyCard = useMemo(() => {
                if(!inspectedCard) return false;
                const id = inspectedCard.instanceId;
                return myGrid.flat().some(c=>c?.instanceId===id) || actSlot?.instanceId===id || sharedZone?.instanceId===id;
            }, [inspectedCard, myGrid, actSlot, sharedZone]);

            const renderCardLayout = (card, showMenuParams) => {
                return (
                    <div className="w-full h-full border-2 border-stone-800 rounded-lg bg-stone-850 shadow-md flex flex-col group overflow-hidden relative">
                        {card.image && (
                            <img src={card.image} alt={card.name} className={`absolute inset-0 w-full h-full object-cover transition ${card.actionUsed ? 'opacity-40 grayscale blur-[1px]' : 'opacity-80 group-hover:opacity-100'}`} />
                        )}
                        {!card.image && (
                            <div className="absolute inset-0 p-2 flex flex-col items-center justify-center bg-stone-900">
                                <span className="text-[9px] font-bold text-stone-200 text-center">{card.name}</span>
                            </div>
                        )}

                        {card.actionUsed && (
                            <div className="absolute inset-0 bg-black/50 z-10 flex items-center justify-center pointer-events-none">
                                <span className="text-3xl opacity-80 drop-shadow-md">💤</span>
                            </div>
                        )}

                        <div className="absolute top-1 right-1 flex flex-col gap-1 z-20 pointer-events-none">
                            {card.markers && Object.entries(card.markers).filter(([k,v])=>v>0).map(([color, count]) => (
                                <div key={color} className="w-4 h-4 rounded-full flex items-center justify-center text-[9px] font-bold border border-stone-950 shadow-md" style={{backgroundColor: color, color: color==='#eab308'?'black':'white'}}>{count}</div>
                            ))}
                        </div>

                        {card.hp !== undefined && (
                            <div className="absolute top-1/2 -translate-y-1/2 left-1 bg-stone-200 text-stone-900 rounded-full w-6 h-6 flex items-center justify-center font-bold text-xs border-2 border-stone-900 shadow-lg z-20 shadow-black/50">
                                {card.currentHp}
                            </div>
                        )}

                        {activeMenu && showMenuParams && activeMenu.id === showMenuParams.id && (
                            <div className="absolute inset-0 bg-stone-950/95 z-30 flex flex-col justify-center items-center gap-1.5 p-2 rounded-lg">
                                {card.hp !== undefined && (
                                    <div className="flex gap-1 w-full">
                                        <button onClick={(e)=>{e.stopPropagation(); modifyHealth(showMenuParams.r, showMenuParams.c, 1)}} className="bg-emerald-900 flex-1 text-emerald-100 text-[9px] py-1 rounded">+1 HP</button>
                                        <button onClick={(e)=>{e.stopPropagation(); modifyHealth(showMenuParams.r, showMenuParams.c, -1)}} className="bg-rose-900 flex-1 text-rose-100 text-[9px] py-1 rounded">-1 HP</button>
                                    </div>
                                )}
                                <div className="flex gap-1 w-full">
                                    <button onClick={(e)=>{e.stopPropagation(); toggleActionUsed(card.instanceId)}} className="bg-stone-700 text-stone-200 text-[9px] w-full py-1 rounded">Action</button>
                                    {showMenuParams.type === 'grid' && (
                                        <button onClick={(e)=>{e.stopPropagation(); setMovingCard(showMenuParams); setActiveMenu(null);}} className="bg-amber-800 text-amber-100 text-[9px] w-full py-1 rounded">Move</button>
                                    )}
                                </div>
                                <button onClick={(e)=>{e.stopPropagation(); sendFieldCardAway(showMenuParams.type, 'grave', showMenuParams.r, showMenuParams.c)}} className="bg-stone-800 text-stone-200 text-[10px] w-full py-1 rounded">To Graveyard</button>
                                <button onClick={(e)=>{e.stopPropagation(); sendFieldCardAway(showMenuParams.type, 'void', showMenuParams.r, showMenuParams.c)}} className="bg-indigo-900 text-indigo-200 text-[10px] w-full py-1 rounded">To Void</button>
                                <button onClick={(e)=>{e.stopPropagation(); setActiveMenu(null)}} className="text-[9px] text-stone-500 underline mt-1">Cancel</button>
                            </div>
                        )}
                    </div>
                );
            }

            const renderCard = (card, onClick, showMenuParams) => {
                const isMoveTarget = movingCard && showMenuParams?.type === 'grid';
                
                if (!card) return (
                    <div 
                        onClick={(e) => { 
                            if (isMoveTarget) {
                                executeMove(showMenuParams.r, showMenuParams.c);
                            } else {
                                if(!showMenuParams || showMenuParams.type==='grid') setInspectedCard(null); 
                                if(onClick) onClick(e); 
                                setIsInspectorOpen(true); 
                            }
                        }} 
                        className={`w-full h-full border-2 border-dashed rounded-lg flex items-center justify-center transition-all hover:scale-105 ${isMoveTarget ? 'border-emerald-500 bg-emerald-900/30 cursor-pointer animate-pulse' : 'border-stone-800 bg-stone-900/40 hover:bg-stone-800 cursor-pointer'}`}
                    >
                        <span className="text-[10px] font-mono text-stone-600 uppercase text-center px-2">
                            {isMoveTarget ? 'Move Here' : 'Empty Space'}
                        </span>
                    </div>
                );

                return (
                    <div 
                        onClick={(e) => { 
                            setInspectedCard(card);
                            if (onClick) onClick(e);
                            if (showMenuParams) setActiveMenu(activeMenu ? null : showMenuParams);
                            setIsInspectorOpen(true);
                        }}

                    {viewModal.isOpen && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex flex-col items-center justify-center p-6 backdrop-blur-sm">
                            <div className="bg-stone-900 border border-amber-900/40 p-6 rounded-2xl w-full max-w-5xl h-[80vh] flex flex-col shadow-2xl relative">
                                <div className="flex justify-between items-center mb-6 shrink-0 border-b border-stone-800 pb-4">
                                    <h3 className="text-xl font-black text-amber-500 uppercase tracking-widest">{viewModal.title} <span className="text-stone-500 font-mono text-sm ml-2">({viewModal.cards.length})</span></h3>
                                    <button onClick={()=>setViewModal({ isOpen: false })} className="text-stone-400 hover:text-white border border-stone-700 hover:bg-stone-800 px-4 py-1.5 rounded transition uppercase text-xs font-bold">Close Menu</button>
                                </div>
                                
                                <div className="flex-1 overflow-y-auto pr-2 flex flex-wrap gap-4 content-start justify-center">
                                    {(viewModal.onSelect ? [...viewModal.cards].sort(() => Math.random() - 0.5) : viewModal.cards).map((card, i) => {
                                        const realIdx = viewModal.onSelect ? viewModal.cards.findIndex(c => c.instanceId === card.instanceId) : null;
                                        
                                        return (
                                            <div 
                                                key={card.instanceId + i} 
                                                onClick={()=> {
                                                    if (viewModal.onSelect) viewModal.onSelect(realIdx);
                                                    else if (viewModal.type === 'myGrave' || viewModal.type === 'myVoid') setModalSelectedIdx(modalSelectedIdx === i ? null : i);
                                                }} 
                                                className={`w-[100px] h-[140px] relative transition-transform hover:scale-105 ${viewModal.onSelect || viewModal.type === 'myGrave' || viewModal.type === 'myVoid' ? 'cursor-pointer' : ''}`}
                                            >
                                                {renderCardLayout(card)}

                                                {/* Action Overlay for Grave/Void Management */}
                                                {modalSelectedIdx === i && (viewModal.type === 'myGrave' || viewModal.type === 'myVoid') && (
                                                    <div className="absolute inset-0 bg-stone-950/95 z-30 flex flex-col justify-center gap-2 p-2 rounded-lg border border-amber-500 shadow-xl">
                                                        <button onClick={(e)=>{e.stopPropagation(); moveFromPile(viewModal.type, i, 'hand')}} className="bg-stone-800 hover:bg-stone-700 text-stone-200 text-[10px] w-full py-2 rounded font-bold uppercase transition">To Hand</button>
                                                        {viewModal.type === 'myGrave' && (
                                                            <button onClick={(e)=>{e.stopPropagation(); moveFromPile(viewModal.type, i, 'void')}} className="bg-indigo-900 hover:bg-indigo-800 text-indigo-200 text-[10px] w-full py-2 rounded font-bold uppercase transition">To Void</button>
                                                        )}
                                                        {viewModal.type === 'myVoid' && (
                                                            <button onClick={(e)=>{e.stopPropagation(); moveFromPile(viewModal.type, i, 'grave')}} className="bg-stone-800 hover:bg-stone-700 text-stone-200 text-[10px] w-full py-2 rounded font-bold uppercase transition">To Graveyard</button>
                                                        )}
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                    {viewModal.cards.length === 0 && (
                                        <div className="col-span-full w-full h-full flex items-center justify-center text-stone-600 italic text-lg mt-10">
                                            This area is completely empty.
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ZOOM MODAL (Matches the Deck Builder) */}
                    {zoomedCard && (
                        <div className="fixed inset-0 bg-black/90 z-[60] flex items-center justify-center p-4 backdrop-blur-sm" onClick={() => setZoomedCard(null)}>
                            <div className="w-[300px] h-[420px] sm:w-[400px] sm:h-[560px] relative rounded-2xl overflow-hidden shadow-2xl border-2 border-amber-700" onClick={e => e.stopPropagation()}>
                                {zoomedCard.image ? (
                                     <img src={zoomedCard.image} alt={zoomedCard.name} className="w-full h-full object-cover" />
                                ) : (
                                     <div className="flex flex-col items-center justify-center h-full bg-stone-800 text-stone-200 p-6 text-center border-4 border-stone-900">
                                         <h2 className="text-3xl font-bold mb-4 text-amber-500">{zoomedCard.name}</h2>
                                         <p className="text-stone-400 italic text-sm">{zoomedCard.description}</p>
                                     </div>
                                )}
                                <button onClick={() => setZoomedCard(null)} className="absolute top-3 right-3 bg-stone-900/80 text-white rounded-full w-8 h-8 flex items-center justify-center hover:bg-rose-600 border border-stone-700 transition">X</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ============================================================================
        // APP ENTRY
        // ============================================================================
        const App = () => {
            const [tab, setTab] = useState('lobby'); 
            const [roomConfig, setRoomConfig] = useState(null);

            const handleJoin = (code, user, isHost) => {
                setRoomConfig({ code, user, isHost });
                setTab('play');
            };

            const handleLeaveLobby = () => {
                setRoomConfig(null);
                setTab('lobby');
            }

            return (
                <GameProvider>
                    <div className="flex flex-col min-h-screen">
                        <header className="bg-stone-900 border-b border-stone-800 p-3 flex justify-between items-center px-6">
                            <h1 className="text-sm font-black tracking-widest text-amber-500 uppercase">GoldBurn v1</h1>
                            {(tab === 'lobby' || tab === 'forge') && (
                                <nav className="flex gap-2">
                                    <button onClick={()=>setTab('lobby')} className={`text-xs px-4 py-1.5 rounded font-bold uppercase tracking-wider transition ${tab==='lobby'?'bg-stone-800 text-stone-200':'text-stone-500 hover:text-stone-300'}`}>Play</button>
                                    <button onClick={()=>setTab('forge')} className={`text-xs px-4 py-1.5 rounded font-bold uppercase tracking-wider transition ${tab==='forge'?'bg-stone-800 text-stone-200':'text-stone-500 hover:text-stone-300'}`}>Deck Builder</button>
                                </nav>
                            )}
                        </header>
                        
                        <main className="flex-1 overflow-hidden">
                            {tab === 'forge' && <DeckBuilder onTestDeck={() => setTab('solo_test')} />}
                            {tab === 'lobby' && <Lobby onJoin={handleJoin} />}
                            {tab === 'play' && (
                                <GameContext.Consumer>
                                    {({ customDeck }) => <SandboxBoard roomCode={roomConfig.code} username={roomConfig.user} isHost={roomConfig.isHost} customDeck={customDeck} onLeaveLobby={handleLeaveLobby} />}
                                </GameContext.Consumer>
                            )}
                            {tab === 'solo_test' && (
                                <GameContext.Consumer>
                                    {({ customDeck }) => <SandboxBoard roomCode="TEST-ENV" username="Deck Tester" isHost={true} customDeck={customDeck} onLeaveLobby={()=>setTab('forge')} isSoloTest={true} />}
                                </GameContext.Consumer>
                            )}
                        </main>
                    </div>
                </GameProvider>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
