                                <div className="absolute inset-0 bg-black/50 z-10 flex items-center justify-center pointer-events-none">
                                    <span className="text-3xl opacity-80 drop-shadow-md">💤</span>
                                </div>
                            )}
                        </div>

                        <div className="absolute top-1 right-1 flex flex-col gap-1 z-20 pointer-events-none">
                            {card.markers && Object.entries(card.markers).filter(([k,v])=>v>0).map(([color, count]) => (
                                <div key={color} className="w-4 h-4 rounded-full flex items-center justify-center text-[9px] font-bold border border-stone-950 shadow-md" style={{backgroundColor: color, color: color==='#eab308'?'black':'white'}}>{count}</div>
                            ))}
                        </div>

                        {card.hp !== undefined && (
                            <div className="absolute top-1/2 -translate-y-1/2 left-1 bg-stone-200 text-stone-900 rounded-full w-6 h-6 flex items-center justify-center font-bold text-xs border-2 border-stone-900 shadow-lg z-20 shadow-black/50">
                                {card.currentHp}
                            </div>
                        )}

                        {activeMenu && showMenuParams && activeMenu.id === showMenuParams.id && !isSpectator && (
                            <div className="absolute inset-0 bg-stone-950/95 z-30 flex flex-col justify-center items-center gap-2 p-3 rounded-lg shadow-inner">
                                <div className="flex gap-1.5 w-full">
                                    <button onClick={(e)=>{e.stopPropagation(); setTargetingSource({ cellId: showMenuParams.id, instanceId: card.instanceId }); setActiveMenu(null); setLockedInspectorId(null);}} className="bg-rose-700/80 hover:bg-rose-600 transition text-rose-100 text-[10px] uppercase font-bold w-full py-1.5 rounded shadow">Target</button>
                                    <button onClick={(e)=>{e.stopPropagation(); toggleActionUsed(card.instanceId)}} className="bg-stone-700/80 hover:bg-stone-600 transition text-stone-200 text-sm w-full py-1.5 rounded flex items-center justify-center shadow" title="Toggle Sleep">💤</button>
                                </div>
                                {showMenuParams.type === 'grid' && (
                                    <button onClick={(e)=>{e.stopPropagation(); setMovingCard(showMenuParams); setActiveMenu(null);}} className="bg-amber-800/80 hover:bg-amber-700 transition text-amber-100 text-[10px] uppercase font-bold w-full py-1.5 rounded shadow">Move</button>
                                )}
                                <button onClick={(e)=>{e.stopPropagation(); sendFieldCardAway(showMenuParams.type, 'grave', showMenuParams.r, showMenuParams.c)}} className="bg-stone-800/80 hover:bg-stone-700 transition text-stone-300 hover:text-white text-[9px] uppercase font-bold w-full py-1.5 rounded shadow mt-1">To Graveyard</button>
                            </div>
                        )}
                    </div>
                );
            }

            const renderCard = (card, onClick, showMenuParams, cellId, isMySpace = false) => {
                const isMoveTarget = isMySpace && movingCard && showMenuParams?.type === 'grid';
                const isPlacingTarget = isMySpace && placingToken && showMenuParams?.type === 'grid';
                const isTargetingMode = targetingSource !== null;
                
                if (!card) return (
                    <div 
                        id={cellId}
                        onClick={(e) => { 
                            e.stopPropagation();
                            if (isTargetingMode && cellId) {
                                if (targetingSource.cellId !== cellId) {
                                    sendPing(targetingSource.cellId, cellId);
                                    updateMyCard(targetingSource.instanceId, c => ({ ...c, actionUsed: true }));
                                }
                                setTargetingSource(null);
                                return;
                            }
                            if (isMoveTarget) { executeMove(showMenuParams.r, showMenuParams.c); return; }
                            if (isPlacingTarget) { placeToGrid(showMenuParams.r, showMenuParams.c); return; }
                            
                            setLockedInspectorId(null);
                            if(!showMenuParams || showMenuParams.type==='grid') setInspectedCard(null); 
                            if(onClick && !isSpectator) onClick(e); 
                        }} 
                        onMouseEnter={() => { if(!isMoveTarget && !isPlacingTarget && !lockedInspectorId) setInspectedCard(null); }}
                        className={`w-full h-full border-2 border-dashed rounded-lg flex items-center justify-center transition-all ${
                            isMoveTarget ? 'border-emerald-500 bg-emerald-900/30 cursor-pointer animate-pulse hover:scale-105' : 
                            isPlacingTarget ? 'border-indigo-500 bg-indigo-900/30 cursor-pointer animate-pulse hover:scale-105' :
                            isTargetingMode ? 'border-rose-500/50 bg-rose-900/20 cursor-crosshair' :
                            isMySpace ? 'border-stone-800 bg-stone-900/40 hover:bg-stone-800 cursor-pointer hover:scale-105' : 'border-stone-800/50 bg-stone-950/20'
                        }`}
                    >
                        <span className="text-[10px] font-mono text-stone-600 uppercase text-center px-2">
                            {isTargetingMode ? 'Target Space' : isMoveTarget ? 'Move Here' : isPlacingTarget ? 'Spawn Here' : 'Empty Space'}
                        </span>
                    </div>
                );
                return (
                    <div 
                        id={cellId}
                        onClick={(e) => { 
                            e.stopPropagation();
                            if (isTargetingMode && cellId) {
                                if (targetingSource.cellId !== cellId) {
                                    sendPing(targetingSource.cellId, cellId);
                                    updateMyCard(targetingSource.instanceId, c => ({ ...c, actionUsed: true }));
                                }
                                setTargetingSource(null);
                                return;
                            }
                            if (lockedInspectorId === card.instanceId && (!showMenuParams || activeMenu?.id === showMenuParams.id)) {
                                setLockedInspectorId(null);
                                if (showMenuParams) setActiveMenu(null);
                            } else {
                                setInspectedCard(card);
                                setLockedInspectorId(card.instanceId);
                                if (onClick && !isTargetingMode && isMySpace && !isSpectator) onClick(e);
                                if (showMenuParams && !isTargetingMode && isMySpace && !isSpectator) setActiveMenu(showMenuParams);
                                if (typeof window !== 'undefined' && window.innerWidth >= 1024 && !isTargetingMode) setIsInspectorOpen(true);
                            }
                        }} 
                        onMouseEnter={() => { if(card && !lockedInspectorId) setInspectedCard(card); }}
                        className={`w-full h-full cursor-pointer transition-all hover:scale-105 relative ${isTargetingMode ? 'ring-2 ring-rose-500/50 hover:ring-rose-500 rounded-lg cursor-crosshair' : ''}`}
                    >
                        {renderCardLayout(card, showMenuParams)}
                    </div>
                );
            };

            const renderPingOverlay = () => {
                return (
                    <svg className="fixed inset-0 w-full h-full pointer-events-none z-[100]" style={{ overflow: 'visible' }}>
                        {activePings.map(ping => {
                            const src = document.getElementById(ping.source);
                            const tgt = document.getElementById(ping.target);
                            if(!src || !tgt) return null;
                            const srcRect = src.getBoundingClientRect();
                            const tgtRect = tgt.getBoundingClientRect();
                            return (
                                <g key={ping.id}>
                                    <line x1={srcRect.left + srcRect.width/2} y1={srcRect.top + srcRect.height/2} x2={tgtRect.left + tgtRect.width/2} y2={tgtRect.top + tgtRect.height/2} stroke={ping.color} strokeWidth="4" strokeLinecap="round" className="ping-line" opacity="0.8" />
                                    <circle cx={tgtRect.left + tgtRect.width/2} cy={tgtRect.top + tgtRect.height/2} r="6" fill={ping.color} opacity="0.8" />
                                </g>
                            );
                        })}
                    </svg>
                );
            };

            // ---------------------------------------------------------
            // PHASE 1: SETUP SCREEN
            // ---------------------------------------------------------
            if (matchPhase === 'SETUP') {
                const chosenVitalId = Object.keys(customDeck).find(id => MASTER_CARDS.find(c => c.id === id)?.type === 'Vital');
                const vitalDef = MASTER_CARDS.find(c => c.id === chosenVitalId);
                const isMyColorTaken = Object.entries(allPlayers).some(([pid, p]) => p.color === myLocalState.color && pid !== myPeerId);

                return (
                    <div className="h-screen flex flex-col items-center justify-center p-4 relative">
                        {alertDialog && (
                            <div className="fixed inset-0 bg-black/80 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
                                <div className="bg-stone-900 border border-amber-500 rounded-xl p-6 max-w-sm w-full text-center shadow-2xl">
                                    <p className="text-stone-200 mb-6">{alertDialog.msg}</p>
                                    <button onClick={() => { if(alertDialog.onClose) alertDialog.onClose(); setAlertDialog(null); }} className="w-full bg-amber-700 hover:bg-amber-600 py-2 rounded text-white font-bold transition">OK</button>
                                </div>
                            </div>
                        )}

                        <div className="bg-stone-900 border border-amber-900/50 p-8 rounded-xl max-w-2xl w-full text-center shadow-2xl relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-amber-700 via-amber-500 to-amber-700"></div>
                            
                            <div className="flex justify-between items-center mb-6">
                                <button onClick={onLeaveLobby} className="text-[10px] bg-rose-950/50 text-rose-500 hover:text-rose-300 border border-rose-900/50 hover:bg-rose-900/60 px-3 py-1.5 rounded transition uppercase font-bold tracking-wider">Leave Lobby</button>
                                <div className="bg-stone-950 border border-stone-800 px-3 py-1.5 rounded-lg shadow flex items-center gap-2">
                                    <span className="text-[9px] uppercase text-stone-500 font-bold">Room</span>
                                    <span className="text-sm font-mono text-amber-500 font-black">{roomCode}</span>
                                </div>
                            </div>

                            <h2 className="text-2xl font-black text-amber-500 uppercase tracking-widest mb-2 mt-2">PREPARATION PHASE</h2>
                            
                            <p className="text-stone-400 text-sm mb-6 h-6">
                                {!connected ? <span className="text-rose-400 animate-pulse">Establishing connection...</span> : 
                                 isSpectator ? <span className="text-indigo-400">Waiting for combatants to lock in...</span> :
                                 !myLocalState.isReady ? "Pick a color and place your Vital card." : 
                                 <span className="text-emerald-400">Locked in. Waiting for others... ({Object.values(allPlayers).filter(p=>p.isReady).length}/{maxPlayers})</span>}
                            </p>
                            
                            {!isSpectator && (
                                <>
                                    <div className="flex justify-center gap-3 mb-6">
                                        {PLAYER_COLORS.map(c => {
                                            const isTaken = Object.entries(allPlayers).some(([pid, p]) => p.color === c.bg && pid !== myPeerId);
                                            return (
                                                <button 
                                                    key={c.name}
                                                    onClick={() => !myLocalState.isReady && !isTaken && handleColorPick(c)}
                                                    className={`w-8 h-8 rounded-full border-2 transition-all ${setupColor.name === c.name ? 'scale-125 ring-2 ring-offset-2 ring-offset-stone-900' : 'opacity-50'} ${!isTaken ? 'hover:opacity-100' : 'opacity-20 cursor-not-allowed grayscale'}`}
                                                    style={{ backgroundColor: c.bg, borderColor: setupColor.name === c.name ? 'white' : 'transparent' }}
                                                    title={isTaken ? `${c.name} (Taken)` : c.name}
                                                    disabled={myLocalState.isReady || isTaken}
                                                >
                                                    {isTaken && <span className="text-white text-[10px] font-black">X</span>}
                                                </button>
                                            )
                                        })}
                                    </div>

                                    <div className="max-w-md mx-auto mb-8 bg-stone-950/50 p-4 rounded-xl border border-stone-800 relative">
                                        {[0, 1].map(r => (
                                            <div key={`setup-row-${r}`} className="flex gap-2 justify-center mb-2 last:mb-0">
                                                {[0,1,2].map(c => {
                                                    const isSelected = myLocalState.vitalPos?.r === r && myLocalState.vitalPos?.c === c;
                                                    return (
                                                        <div 
                                                            key={`setup-${r}-${c}`} 
                                                            onClick={() => !myLocalState.isReady && connected && setMyLocalState(prev => ({...prev, vitalPos:{r, c}}))}
                                                            className={`w-[15vw] sm:w-[80px] h-[21vw] sm:h-[112px] border-2 rounded-lg transition-all flex flex-col items-center justify-center relative overflow-hidden
                                                                  ${!connected ? 'border-stone-900 bg-stone-950 cursor-not-allowed' : 
                                                                  isSelected ? 'border-amber-500 bg-amber-950/50 shadow-[0_0_15px_rgba(245,158,11,0.2)]' : 
                                                                  'border-stone-800 border-dashed bg-stone-950 hover:border-stone-600 hover:scale-105 cursor-pointer'}`}
                                                        >
                                                            {isSelected ? (
                                                                <>
                                                                    {vitalDef?.image ? (
                                                                        <img src={vitalDef.image} alt={vitalDef.name} className="absolute inset-0 w-full h-full object-cover opacity-80" />
                                                                    ) : (
                                                                        <div className="absolute inset-0 bg-stone-900 p-1 flex items-center justify-center text-center">
                                                                            <span className="text-[7px] font-bold text-stone-200">{vitalDef?.name}</span>
                                                                        </div>
                                                                    )}
                                                                    <div className="absolute inset-0 ring-4 ring-amber-500 ring-inset rounded-lg pointer-events-none z-20"></div>
                                                                </>
                                                            ) : (
                                                                <span className="text-[8px] sm:text-[10px] font-mono text-stone-700 text-center px-1 sm:px-2 uppercase">Empty<br/>Space</span>
                                                            )}
                                                        </div>
                                                    )
                                                })}
                                            </div>
                                        ))}
                                    </div>

                                    <button 
                                        onClick={lockVitalPlacement} 
                                        disabled={!connected || myLocalState.isReady || !myLocalState.vitalPos || isMyColorTaken}
                                        className={`px-8 py-3 rounded uppercase font-bold tracking-wider transition w-full max-w-md ${
                                            !connected || myLocalState.isReady || !myLocalState.vitalPos || isMyColorTaken ? 'bg-stone-800 text-stone-600 border border-stone-700 cursor-not-allowed' : 'bg-gradient-to-r from-amber-800 to-amber-950 hover:brightness-110 text-amber-100 border border-amber-700/50 shadow-lg'
                                        }`}
                                    >
                                        {myLocalState.isReady ? 'Locked In' : isMyColorTaken ? 'Color Taken' : 'Confirm Preparation'}
                                    </button>
                                </>
                            )}
                        </div>
                    </div>
                );
            }

            // ---------------------------------------------------------
            // PHASE 2: MAIN BOARD (3-4 PLAYER LAYOUT)
            // ---------------------------------------------------------
            const activePlayerIds = Object.keys(allPlayers).filter(id => !allPlayers[id].isDead);
            
            // Layout Calculation
            let bottomIds = [];
            let topIds = [];
            
            if (isSpectator) {
                const half = Math.ceil(activePlayerIds.length / 2);
                bottomIds = activePlayerIds.slice(0, half);
                topIds = activePlayerIds.slice(half);
            } else {
                const myIdx = activePlayerIds.indexOf(myPeerId);
                if (myIdx !== -1) {
                    const others = activePlayerIds.filter(id => id !== myPeerId);
                    bottomIds = [myPeerId];
                    if (others.length >= 3) {
                        bottomIds.push(others[0]);
                        topIds = [others[1], others[2]];
                    } else if (others.length === 2) {
                        topIds = [others[0], others[1]];
                    } else if (others.length === 1) {
                        topIds = [others[0]];
                    }
                }
            }

            const renderPlayerGrid = (id, isTopRow = false) => {
                const pState = id === myPeerId ? myLocalState : allPlayers[id];
                if (!pState) return null;
                const isMe = id === myPeerId && !isSpectator;
                
                // Flip perspective visually for top rows 
                const gridRows = isTopRow ? [1, 0] : [0, 1];

                return (
                    <div key={id} className={`flex flex-col items-center ${isMe ? '' : 'opacity-80'}`}>
                        <div className="flex justify-between w-full px-2 mb-1">
                            <span className="text-[10px] font-mono font-bold uppercase tracking-widest" style={{ color: pState.color }}>
                                {pState.username} {isMe ? '(You)' : ''} {pState.isHost ? '👑' : ''}
                            </span>
                            <span className="text-[10px] font-mono bg-stone-950 px-2 py-0.5 rounded border border-stone-800 text-amber-500">Gold: {pState.gold}</span>
                        </div>
                        <div className="flex flex-col gap-2">
                            {gridRows.map(r => (
                                <div key={`grid-${id}-${r}`} className="flex justify-center gap-2">
                                    {[0,1,2].map(c => (
                                        <div key={`cell-${id}-${r}-${c}`} className="w-[12vw] sm:w-[65px] lg:w-[80px] h-[16.8vw] sm:h-[91px] lg:h-[112px]">
                                            {renderCard(
                                                pState.grid[r][c], 
                                                isMe ? () => placeToGrid(r, c) : () => { 
                                                    setInspectedCard(pState.grid[r][c]); setLockedInspectorId(pState.grid[r][c]?.instanceId); 
                                                    if(window.innerWidth >= 1024) setIsInspectorOpen(true); 
                                                }, 
                                                isMe ? { type: 'grid', r, c, id: `cell-${id}-${r}-${c}` } : null, 
                                                `cell-${id}-${r}-${c}`, 
                                                isMe
                                            )}
                                        </div>
                                    ))}
                                </div>
                            ))}
                        </div>
                        {!isMe && (
                            <div className="flex gap-2 mt-1 text-[8px] font-mono text-stone-500">
                                <span>Hand: {pState.hand.length}</span>
                                <span>Deck: {pState.deck.length}</span>
                                <span>GY: {pState.grave.length}</span>
                            </div>
                        )}
                    </div>
                );
            };

            return (
                <div className="h-screen flex flex-col lg:flex-row p-2 md:p-4 gap-2 md:gap-4 max-w-[1700px] mx-auto overflow-y-auto lg:overflow-hidden relative" onClick={clearInteractions}>
                    {renderPingOverlay()}
                    
                    {popupMsg && (
                        <div className="fixed top-[40%] left-1/2 -translate-x-1/2 z-[100] bg-stone-950/95 border border-amber-500/50 text-amber-400 font-bold px-8 py-6 rounded-2xl shadow-[0_0_40px_rgba(245,158,11,0.3)] text-xl text-center pointer-events-none animate-pulse max-w-sm backdrop-blur-sm">
                            {popupMsg}
                        </div>
                    )}

                    {alertDialog && (
                        <div className="fixed inset-0 bg-black/80 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-stone-900 border border-amber-500 rounded-xl p-6 max-w-sm w-full text-center shadow-2xl">
                                <p className="text-stone-200 mb-6 font-bold">{alertDialog.msg}</p>
                                <button onClick={() => { if(alertDialog.onClose) alertDialog.onClose(); setAlertDialog(null); }} className="w-full bg-amber-700 hover:bg-amber-600 py-2 rounded text-white font-bold transition">OK</button>
                            </div>
                        </div>
                    )}

                    {/* STATS & LOGS COLUMNS */}
                    <div className="hidden lg:flex w-64 flex-col gap-4 shrink-0 overflow-y-auto relative z-10">
                        <div className="bg-stone-900 border border-stone-800 rounded-xl p-4 shadow-md w-full">
                            <div className="flex justify-between items-center mb-2 border-b border-stone-800 pb-2">
                                <h2 className="text-xs font-black text-amber-500 uppercase tracking-widest">{isSpectator ? 'Spectating' : `Room: ${roomCode}`}</h2>
                                <button onClick={onLeaveLobby} className="text-[9px] bg-rose-950/50 text-rose-500 hover:text-rose-300 border border-rose-900/50 hover:bg-rose-900/60 px-2 py-0.5 rounded transition uppercase font-bold tracking-wider">Leave</button>
                            </div>
                            <div className="flex items-center justify-between text-[10px] font-mono mb-2">
                                <div className="flex items-center gap-2">
                                    <div className={`w-2 h-2 rounded-full ${connected ? 'bg-emerald-500' : 'bg-rose-500 animate-pulse'}`}></div>
                                    <span className={connected ? 'text-emerald-400' : 'text-rose-400'}>{connected ? 'Linked' : 'Lost'}</span>
                                </div>
                                <span className="text-stone-400">{formatTime(matchTime)}</span>
                            </div>
                            {!isSpectator && !myLocalState.isDead && (
                                <div className="bg-stone-950 border border-stone-850 p-2 rounded flex justify-between items-center mt-3">
                                    <span className="text-[10px] text-amber-500 uppercase">Your Gold</span>
                                    <div className="flex items-center gap-2">
                                        <button onClick={()=>modifyGold(-1)} className="w-5 h-5 bg-stone-800 hover:bg-stone-700 rounded flex items-center justify-center text-stone-400 transition">-</button>
                                        <span className="font-bold text-amber-400 w-4 text-center">{myLocalState.gold}</span>
                                        <button onClick={()=>modifyGold(1)} className="w-5 h-5 bg-stone-800 hover:bg-stone-700 rounded flex items-center justify-center text-stone-400 transition">+</button>
                                    </div>
                                </div>
                            )}
                        </div>

                        <div className="flex flex-col gap-4 flex-1 min-h-[300px]">
                            <div className="flex-1 bg-stone-900 border border-stone-800 rounded-xl p-3 flex flex-col min-h-[150px]">
                                <span className="text-[10px] font-bold text-stone-500 uppercase tracking-widest border-b border-stone-800 pb-1 mb-2">Chat</span>
                                <div className="flex-1 overflow-y-auto space-y-1.5 font-mono text-[10px] pr-1 mb-2">
                                    {chatLogs.map((c, i) => (
                                        <div key={i} className="leading-tight">
                                            <span style={{color: c.color}} className="font-bold">{c.sender}: </span>
                                            <span className="text-stone-200">{c.msg}</span>
                                        </div>
                                    ))}
                                </div>
                                <form onSubmit={e => { e.preventDefault(); handleSendChat(); }} className="flex gap-1 mt-auto shrink-0">
                                    <input type="text" value={chatInput} onChange={e=>setChatInput(e.target.value)} className="flex-1 bg-stone-950 border border-stone-800 rounded px-2 py-1 text-[10px] text-white outline-none focus:border-emerald-600 transition" placeholder="Message..." />
                                    <button type="submit" className="bg-stone-800 text-stone-300 px-3 rounded text-[10px] font-bold hover:bg-stone-700 transition">Send</button>
                                </form>
                            </div>
                            
                            <div className="flex-1 bg-stone-900 border border-stone-800 rounded-xl p-3 flex flex-col min-h-[120px]">
                                <span className="text-[10px] font-bold text-stone-500 uppercase tracking-widest border-b border-stone-800 pb-1 mb-2">Actions Log</span>
                                <div className="flex-1 overflow-y-auto space-y-1 font-mono text-[9px] text-stone-400 pr-1">
                                    {logs.map((l, i) => (
                                        <div key={i} className="border-b border-stone-950 pb-0.5 leading-tight">
                                            <span className="text-stone-600">[{l.time}] </span>
                                            <span style={{color: l.color}} className="font-bold">{l.senderName}</span> {l.msg}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* CENTER BATTLEFIELD */}
                    <div className="flex-1 flex flex-col gap-4 min-w-0 pb-10 lg:pb-0 relative">
                        <div className="flex-1 bg-stone-900 border border-stone-800 rounded-xl p-2 sm:p-4 flex flex-col justify-between shadow-inner overflow-x-auto min-h-[500px]">
                            
                            {/* TOP GRIDS */}
                            {topIds.length > 0 && (
                                <div className="flex justify-center gap-8 md:gap-16">
                                    {topIds.map(id => renderPlayerGrid(id, true))}
                                </div>
                            )}

                            {/* CENTER ACTS & ZONE */}
                            <div className="w-full flex items-center border-y border-stone-800/60 py-3 my-4 bg-stone-950/30 rounded-xl px-2 md:px-4 justify-center gap-4 flex-wrap">
                                {/* Enemy Acts (Left side) */}
                                <div className="flex gap-2 border-r border-stone-800/50 pr-4">
                                    {activePlayerIds.filter(id => id !== myPeerId).map((id, idx) => {
                                        const pState = allPlayers[id];
                                        return (
                                            <div key={`act-${id}`} className="flex flex-col items-center">
                                                <span className="text-[7px] uppercase font-mono mb-1 truncate w-16 text-center" style={{color: pState.color}}>{pState.username}'s Act</span>
                                                <div className="w-[12vw] sm:w-[65px] lg:w-[80px] h-[16.8vw] sm:h-[91px] lg:h-[112px]">
                                                    {renderCard(pState.actSlot, () => { 
                                                        if(pState.actSlot) { setInspectedCard(pState.actSlot); setLockedInspectorId(pState.actSlot.instanceId); if(window.innerWidth>=1024) setIsInspectorOpen(true); } 
                                                    }, null, `cell-act-${id}`)}
                                                </div>
                                            </div>
                                        )
                                    })}
                                </div>

                                {/* Shared Zone (Center) */}
                                <div className="flex flex-col items-center px-4">
                                    <span className="text-[9px] font-mono text-amber-500 uppercase tracking-widest mb-1 text-center font-bold">Zone in Play</span>
                                    <div className="w-[14vw] sm:w-[75px] lg:w-[90px] h-[19.6vw] sm:h-[105px] lg:h-[126px] relative ring-2 ring-amber-900/50 rounded-lg">
                                        {renderCard(sharedZone, placeToZone, { type: 'zone', id: 'cell-shared-zone' }, 'cell-shared-zone', !isSpectator)}
                                    </div>
                                </div>

                                {/* My Act (Right side) */}
                                {!isSpectator && !myLocalState.isDead && (
                                    <div className="flex gap-2 border-l border-stone-800/50 pl-4">
                                        <div className="flex flex-col items-center">
                                            <span className="text-[7px] uppercase font-mono mb-1 text-amber-500">Your Act Slot</span>
                                            <div className="w-[12vw] sm:w-[65px] lg:w-[80px] h-[16.8vw] sm:h-[91px] lg:h-[112px]">
                                                {renderCard(myLocalState.actSlot, placeToAct, { type: 'act', id: 'cell-my-act' }, 'cell-my-act', true)}
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>

                            {/* BOTTOM GRIDS */}
                            {bottomIds.length > 0 && (
                                <div className="flex justify-center gap-8 md:gap-16">
                                    {bottomIds.map(id => renderPlayerGrid(id, false))}
                                </div>
                            )}

                        </div>

                        {/* Hand & Piles (Only if actively playing) */}
                        {!isSpectator && !myLocalState.isDead && (
                            <div className="bg-stone-900 border border-stone-800 rounded-xl p-2 sm:p-4 flex gap-2 sm:gap-4 shrink-0 overflow-hidden relative z-10">
                                <div className="flex flex-col gap-2 w-16 sm:w-28 border-r border-stone-800 pr-2 sm:pr-4 shrink-0">
                                    <button onClick={(e)=>{e.stopPropagation(); drawFromDeck();}} className="flex-1 bg-stone-950 border border-stone-800 hover:border-amber-600 rounded text-xs font-bold text-stone-300 transition flex flex-col items-center justify-center">
                                        <span className="hidden sm:inline">Draw</span><span className="sm:hidden text-[10px]">Draw</span>
                                        <span className="text-[8px] sm:text-[9px] text-stone-500 font-mono">({myLocalState.deck.length})</span>
                                    </button>
                                    <button onClick={(e)=>{e.stopPropagation(); openViewer('Your Deck', myLocalState.deck, 'deck', true);}} className="bg-stone-800 text-[8px] sm:text-[9px] text-stone-400 py-1 rounded hover:text-stone-200 transition">Search Deck</button>
                                    <div className="flex gap-1 flex-col sm:flex-row h-full sm:h-auto">
                                        <button onClick={(e)=>{e.stopPropagation(); openViewer('Your Graveyard', myLocalState.grave, 'myGrave');}} className="flex-1 bg-stone-950 border border-stone-800 hover:border-stone-600 rounded flex flex-col items-center justify-center py-1 transition">
                                            <span className="text-[8px] sm:text-[9px] font-bold text-stone-500">Grave</span>
                                            <span className="text-[7px] sm:text-[8px] text-stone-600 font-mono">({myLocalState.grave.length})</span>
                                        </button>
                                        <button onClick={(e)=>{e.stopPropagation(); openViewer('Your Void', myLocalState.voidZone, 'myVoid');}} className="flex-1 bg-stone-950 border border-stone-800 hover:border-stone-600 rounded flex flex-col items-center justify-center py-1 transition">
                                            <span className="text-[8px] sm:text-[9px] font-bold text-indigo-500/70">Void</span>
                                            <span className="text-[7px] sm:text-[8px] text-stone-600 font-mono">({myLocalState.voidZone.length})</span>
                                        </button>
                                    </div>
                                </div>

                                <div className="flex-1 overflow-x-auto pb-2 min-w-0">
                                    <span className="text-[10px] font-mono text-stone-500 uppercase block mb-1 pl-1">Your Hand</span>
                                    <div className="flex gap-2">
                                        {myLocalState.hand.map((card, idx) => (
                                            <div key={card.instanceId} 
                                                 onClick={(e) => { 
                                                     e.stopPropagation();
                                                     if (selectedHandIdx === idx) { setSelectedHandIdx(null); setLockedInspectorId(null); } 
                                                     else { setSelectedHandIdx(idx); setInspectedCard(card); setLockedInspectorId(card.instanceId); if (window.innerWidth >= 1024) setIsInspectorOpen(true); }
                                                 }} 
                                                 onMouseEnter={() => { if(!lockedInspectorId) setInspectedCard(card); }}
                                                 className={`w-[14vw] sm:w-[80px] h-[19.6vw] sm:h-[112px] flex-shrink-0 transition-transform cursor-pointer relative hover:scale-105 ${selectedHandIdx === idx ? '-translate-y-2 ring-2 ring-amber-500 rounded-lg' : ''}`}>
                                                <div className="w-full h-full border-2 border-stone-800 rounded-lg bg-stone-850 flex flex-col justify-between overflow-hidden relative">
                                                    {card.image ? <img src={card.image} alt={card.name} className="absolute inset-0 w-full h-full object-cover opacity-80" /> : <div className="absolute inset-0 bg-stone-900 p-1 flex items-center justify-center text-center"><span className="text-[7px] sm:text-[8px] font-bold text-stone-200">{card.name}</span></div>}
                                                    {selectedHandIdx === idx && (
                                                        <div className="absolute inset-0 bg-stone-950/90 z-20 flex flex-col items-center justify-center gap-1 p-1 sm:p-2">
                                                            <button onClick={(e)=>{e.stopPropagation(); sendHandCardAway(idx, 'grave');}} className="bg-stone-800 hover:bg-stone-700 text-stone-200 text-[8px] w-full py-0.5 rounded border border-stone-700 transition">To Grave</button>
                                                            <button onClick={(e)=>{e.stopPropagation(); sendHandCardAway(idx, 'void');}} className="bg-indigo-900 hover:bg-indigo-800 text-indigo-200 text-[8px] w-full py-0.5 rounded border border-indigo-800 transition">To Void</button>
                                                            <button onClick={(e)=>{e.stopPropagation(); sendHandCardAway(idx, 'deck');}} className="bg-emerald-900 hover:bg-emerald-800 text-emerald-200 text-[8px] w-full py-0.5 rounded border border-emerald-800 transition">To Deck</button>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Spectator Global Hands Viewer */}
                        {(isSpectator || myLocalState.isDead) && (
                            <div className="bg-stone-900 border border-stone-800 rounded-xl p-2 sm:p-4 overflow-x-auto min-h-[160px]">
                                <div className="flex justify-between items-center mb-2 border-b border-stone-800 pb-2">
                                    <span className="text-[10px] font-mono text-stone-500 uppercase">Combatant Hands</span>
                                    <label className="flex items-center gap-2 cursor-pointer">
                                        <input type="checkbox" checked={streamerMode} onChange={(e) => setStreamerMode(e.target.checked)} className="accent-amber-600" />
                                        <span className="text-[10px] text-stone-400 font-bold uppercase">Streamer Mode (Hide Hands)</span>
                                    </label>
                                </div>
                                <div className="flex gap-6">
                                    {!streamerMode && activePlayerIds.map(id => {
                                        const pState = allPlayers[id];
                                        if(!pState) return null;
                                        return (
                                            <div key={`hand-${id}`} className="flex flex-col">
                                                <span className="text-[8px] font-bold uppercase mb-1 truncate w-full" style={{color: pState.color}}>{pState.username}</span>
                                                <div className="flex gap-1">
                                                    {pState.hand.map((card, idx) => (
                                                        <div key={`scard-${id}-${idx}`} onClick={()=>{setInspectedCard(card); if(window.innerWidth>=1024)setIsInspectorOpen(true);}} className="w-[10vw] sm:w-[60px] h-[14vw] sm:h-[84px] cursor-pointer hover:scale-105 transition-transform border border-stone-700 rounded-lg overflow-hidden relative">
                                                            {card.image ? <img src={card.image} className="absolute inset-0 w-full h-full object-cover" /> : <div className="bg-stone-800 w-full h-full p-1 text-[6px]">{card.name}</div>}
                                                        </div>
                                                    ))}
                                                    {pState.hand.length === 0 && <span className="text-[9px] text-stone-600 italic mt-4">Empty</span>}
                                                </div>
                                            </div>
                                        )
                                    })}
                                </div>
                            </div>
                        )}

                    </div>

                    {/* RIGHT PANEL: Tools & Inspector */}
                    <div className={`fixed lg:relative right-0 top-0 bottom-0 lg:bottom-auto z-50 transition-all duration-300 ease-in-out flex flex-col bg-stone-900 border-l lg:border border-stone-800 lg:rounded-xl shadow-2xl lg:shadow-md shrink-0 h-full ${isInspectorOpen ? 'w-[75vw] sm:w-[320px]' : 'w-0 lg:w-8'}`} onClick={(e)=>e.stopPropagation()}>
                        
                        <button 
                            onClick={() => setIsInspectorOpen(!isInspectorOpen)} 
                            className="absolute -left-8 lg:-left-6 top-[15%] lg:top-1/2 -translate-y-1/2 bg-stone-800 border border-stone-700 border-r-0 text-stone-300 rounded-l-xl w-8 lg:w-6 h-20 lg:h-16 flex items-center justify-center hover:bg-stone-700 hover:text-amber-400 z-50 transition-colors cursor-pointer shadow-[-4px_0_10px_rgba(0,0,0,0.5)]"
                        >
                            {isInspectorOpen ? '▶' : '◀'}
                        </button>

                        <div className={`w-full h-full flex flex-col gap-5 overflow-y-auto overflow-x-hidden ${isInspectorOpen ? 'p-4' : 'py-4 hidden lg:flex'} transition-opacity duration-300 ${isInspectorOpen ? 'opacity-100 delay-150' : 'opacity-0'}`}>
                            
                            {/* Card Inspector Tool */}
                            <div className="flex flex-col items-center mt-6 lg:mt-0 shrink-0">
                                <span className="text-xs font-bold text-stone-500 uppercase tracking-widest border-b border-stone-800 w-full text-center pb-2 mb-4 flex items-center justify-center gap-2">
                                    Card Inspector
                                    {lockedInspectorId && <span className="text-amber-500 text-[10px]" title="Locked (Click background to clear)">🔒</span>}
                                    {inspectedCard && <svg onClick={()=>setZoomedCard(inspectedCard)} className="w-4 h-4 text-stone-400 hover:text-amber-400 cursor-pointer" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>}
                                </span>
                                
                                {inspectedCard ? (
                                    <div className="flex flex-col gap-3 w-full items-center">
                                        <div onClick={()=>setZoomedCard(inspectedCard)} className="w-[50vw] sm:w-[280px] h-[70vw] sm:h-[392px] relative rounded-2xl overflow-hidden shadow-2xl border-2 border-amber-600 shrink-0 bg-stone-850 cursor-pointer group">
                                            {inspectedCard.image ? <img src={inspectedCard.image} alt={inspectedCard.name} className="absolute inset-0 w-full h-full object-cover transition-transform group-hover:scale-105 duration-500" /> : (
                                                <div className="absolute inset-0 bg-stone-800 flex flex-col p-6 text-center items-center justify-center">
                                                    <span className="text-xl sm:text-2xl font-bold text-stone-200 mb-2">{inspectedCard.name}</span>
                                                    <span className="text-sm sm:text-base font-mono text-amber-500 mb-6">{inspectedCard.cost}G</span>
                                                    <p className="text-xs sm:text-sm text-stone-400 italic">{inspectedCard.description}</p>
                                                    <span className="text-[10px] sm:text-xs text-stone-500 mt-auto uppercase">{inspectedCard.type}</span>
                                                </div>
                                            )}
                                            
                                            {inspectedCard.markers && (
                                                <div className="absolute top-2 right-2 flex flex-col gap-1.5 z-20 pointer-events-none">
                                                    {Object.entries(inspectedCard.markers).filter(([k,v])=>v>0).map(([color, count]) => (
                                                        <div key={color} className="w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold border-2 border-stone-950 shadow-md" style={{backgroundColor: color, color: color==='#eab308'?'black':'white'}}>{count}</div>
                                                    ))}
                                                </div>
                                            )}

                                            <div className="absolute bottom-2 right-2 bg-black/60 p-1 rounded opacity-0 group-hover:opacity-100 transition">
                                                <svg className="w-5 h-5 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                                            </div>
                                        </div>

                                        {inspectedCard.hp !== undefined && (
                                            <div className="flex items-center justify-between bg-stone-900 border border-stone-800 w-full max-w-[280px] p-2 rounded-xl shadow-md">
                                                <span className="text-[10px] text-stone-500 font-bold uppercase tracking-widest pl-2">Health</span>
                                                <div className="flex items-center gap-3">
                                                    {isMyCard && !isSpectator && <button onClick={() => modifyHealth(inspectedCard.instanceId, -1)} className="w-7 h-7 bg-rose-900/40 hover:bg-rose-900/80 border border-rose-700/50 text-rose-400 rounded-lg font-black transition flex items-center justify-center">-</button>}
                                                    <span className="text-xl font-black text-amber-500 w-8 text-center">{inspectedCard.currentHp}</span>
                                                    {isMyCard && !isSpectator && <button onClick={() => modifyHealth(inspectedCard.instanceId, 1)} className="w-7 h-7 bg-emerald-900/40 hover:bg-emerald-900/80 border border-emerald-700/50 text-emerald-400 rounded-lg font-black transition flex items-center justify-center">+</button>}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                ) : (
                                    <div className="w-[50vw] sm:w-[280px] h-[70vw] sm:h-[392px] border-2 border-dashed border-stone-700 rounded-2xl flex flex-col items-center justify-center p-4 bg-stone-900/50 shrink-0">
                                        <span className="text-xs sm:text-sm font-mono text-stone-600 uppercase text-center">Select a card</span>
                                    </div>
                                )}
                            </div>

                            {/* Status Effect Markers UI Dropdown */}
                            {isMyCard && !isSpectator && (
                                <div className="bg-stone-950 border border-stone-800 rounded-xl shrink-0 transition-all overflow-hidden">
                                    <button onClick={() => setShowMarkersUI(!showMarkersUI)} className="w-full flex justify-between items-center p-4 text-[10px] font-bold text-stone-500 uppercase tracking-widest outline-none hover:bg-stone-900 transition-colors">
                                        <span>Status Markers</span><span className="text-stone-400">{showMarkersUI ? '▲' : '▼'}</span>
                                    </button>
                                    {showMarkersUI && (
                                        <div className="flex justify-between px-3 pb-4">
                                            {MARKER_COLORS.map(c => {
                                                const count = inspectedCard.markers?.[c.bg] || 0;
                                                return (
                                                    <div key={c.bg} className="flex flex-col items-center gap-1.5">
                                                        <button onClick={()=>addMarker(c.bg, 1)} className="text-stone-400 hover:text-stone-200 bg-stone-800 w-6 h-6 rounded flex justify-center items-center leading-none">+</button>
                                                        <div className="w-5 h-5 rounded-full border border-stone-600 relative shadow-inner" style={{backgroundColor: c.bg}}>
                                                            {count > 0 && <span className="absolute -top-2 -right-2 bg-stone-800 text-white text-[10px] w-4 h-4 flex items-center justify-center rounded-full font-bold">{count}</span>}
                                                        </div>
                                                        <button onClick={()=>addMarker(c.bg, -1)} className="text-stone-400 hover:text-stone-200 bg-stone-800 w-6 h-6 rounded flex justify-center items-center leading-none">-</button>
                                                    </div>
                                                )
                                            })}
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* Dice Roller */}
                            {!isSpectator && !myLocalState.isDead && (
                                <div className="bg-stone-950 border border-stone-800 rounded-xl p-4 flex flex-col gap-3 shrink-0">
                                    <span className="text-[10px] font-bold text-stone-500 uppercase tracking-widest block text-center">Dice Roller</span>
                                    <div className="flex gap-2">
                                        <select value={diceType} onChange={e => setDiceType(e.target.value)} className="flex-1 bg-stone-900 border border-stone-700 rounded px-2 text-xs text-stone-300 outline-none">
                                            <option value="4">D4</option><option value="6">D6</option><option value="8">D8</option><option value="12">D12</option><option value="20">D20</option><option value="coin">Coin</option>
                                        </select>
                                        <button onClick={executeRoll} className="bg-stone-800 hover:bg-stone-700 text-stone-300 font-bold px-4 py-2 rounded text-xs transition border border-stone-700 shadow">Roll</button>
                                    </div>
                                </div>
                            )}

                            {!isSpectator && !myLocalState.isDead && (
                                <div className="bg-stone-950 border border-stone-800 rounded-xl p-4 flex flex-col items-center shrink-0 mt-auto">
                                    <button onClick={() => setTokenModal(true)} className="w-full bg-indigo-900/30 hover:bg-indigo-900/60 text-indigo-400 border border-indigo-900/50 rounded py-2 mb-2 text-xs font-bold uppercase transition flex items-center justify-center gap-2">
                                        Spawn Token
                                    </button>
                                    <button onClick={clearAllActions} className="w-full bg-amber-900/30 hover:bg-amber-900/60 text-amber-500 border border-amber-900/50 rounded py-2 text-xs font-bold uppercase transition flex items-center justify-center gap-2">
                                        Refresh All Actions
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* Universal Viewer Modal */}
                    {viewModal.isOpen && (
                        <div className="fixed inset-0 bg-black/80 z-[100] flex flex-col items-center justify-center p-6 backdrop-blur-sm">
                            <div className="bg-stone-900 border border-amber-900/40 p-4 md:p-6 rounded-2xl w-full max-w-5xl h-[80vh] flex flex-col shadow-2xl relative">
                                <div className="flex justify-between items-center mb-6 shrink-0 border-b border-stone-800 pb-4">
                                    <h3 className="text-sm md:text-xl font-black text-amber-500 uppercase tracking-widest">{viewModal.title} <span className="text-stone-500 font-mono text-sm ml-2">({viewModal.cards.length})</span></h3>
                                    <button onClick={()=>setViewModal({ isOpen: false })} className="text-stone-400 hover:text-white border border-stone-700 hover:bg-stone-800 px-3 md:px-4 py-1.5 rounded transition uppercase text-[10px] md:text-xs font-bold">Close</button>
                                </div>
                                <div className="flex-1 overflow-y-auto pr-2 flex flex-wrap gap-4 content-start justify-center">
                                    {(viewModal.onSelect ? [...viewModal.cards].sort((a, b) => a.name.localeCompare(b.name)) : viewModal.cards).map((card, i) => {
                                        const realIdx = viewModal.onSelect ? viewModal.cards.findIndex(c => c.instanceId === card.instanceId) : null;
                                        return (
                                            <div key={card.instanceId + i} onClick={()=> { if (viewModal.onSelect) viewModal.onSelect(realIdx); else if (viewModal.type === 'myGrave' || viewModal.type === 'myVoid') setModalSelectedIdx(modalSelectedIdx === i ? null : i); }} className={`w-[22vw] sm:w-[100px] h-[30.8vw] sm:h-[140px] relative transition-transform hover:scale-105 ${viewModal.onSelect || viewModal.type === 'myGrave' || viewModal.type === 'myVoid' ? 'cursor-pointer' : ''}`}>
                                                {renderCardLayout(card)}
                                                {modalSelectedIdx === i && (viewModal.type === 'myGrave' || viewModal.type === 'myVoid') && !isSpectator && (
                                                    <div className="absolute inset-0 bg-stone-950/95 z-30 flex flex-col justify-center gap-2 p-2 rounded-lg border border-amber-500 shadow-xl">
                                                        <button onClick={(e)=>{e.stopPropagation(); moveFromPile(viewModal.type, i, 'hand')}} className="bg-stone-800 text-stone-200 text-[8px] sm:text-[10px] w-full py-1.5 rounded uppercase font-bold">To Hand</button>
                                                        <button onClick={(e)=>{e.stopPropagation(); moveFromPile(viewModal.type, i, 'deck')}} className="bg-emerald-900 text-emerald-200 text-[8px] sm:text-[10px] w-full py-1.5 rounded uppercase font-bold">To Deck</button>
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ZOOM MODAL */}
                    {zoomedCard && (
                        <div className="fixed inset-0 bg-black/90 z-[110] flex items-center justify-center p-4 backdrop-blur-sm" onClick={() => setZoomedCard(null)}>
                            <div className="w-[80vw] h-[112vw] sm:w-[400px] sm:h-[560px] max-w-[400px] max-h-[560px] relative rounded-2xl overflow-hidden shadow-2xl border-2 border-amber-700" onClick={e => e.stopPropagation()}>
                                {zoomedCard.image ? <img src={zoomedCard.image} alt={zoomedCard.name} className="w-full h-full object-cover" /> : (
                                    <div className="flex flex-col items-center justify-center h-full bg-stone-800 text-stone-200 p-6 text-center border-4 border-stone-900">
                                         <h2 className="text-3xl font-bold mb-4 text-amber-500">{zoomedCard.name}</h2>
                                         <p className="text-stone-400 italic text-sm">{zoomedCard.description}</p>
                                     </div>
                                )}
                                <button onClick={() => setZoomedCard(null)} className="absolute top-3 right-3 bg-stone-900/80 text-white rounded-full w-8 h-8 flex items-center justify-center hover:bg-rose-600 border border-stone-700 transition">X</button>
                            </div>
                        </div>
                    )}

                    {/* TOKEN MODAL */}
                    {tokenModal && (
                        <div className="fixed inset-0 bg-black/80 z-[110] flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-stone-900 border border-indigo-500 rounded-xl p-6 max-w-sm w-full shadow-2xl">
                                <h3 className="text-indigo-400 font-bold mb-4 uppercase tracking-widest text-center">Spawn Token</h3>
                                <input type="text" value={tokenData.name} onChange={e=>setTokenData({...tokenData, name: e.target.value})} className="w-full bg-stone-950 border border-stone-800 rounded px-3 py-2 text-stone-200 outline-none focus:border-indigo-600 mb-4" placeholder="Token Name" />
                                <div className="flex gap-4">
                                    <button onClick={() => setTokenModal(false)} className="flex-1 bg-stone-800 hover:bg-stone-700 py-2 rounded text-stone-300 font-bold">Cancel</button>
                                    <button onClick={handleSpawnToken} className="flex-1 bg-indigo-700 hover:bg-indigo-600 py-2 rounded text-white font-bold">Drop</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ============================================================================
        // APP ENTRY
        // ============================================================================
        const App = () => {
            const [tab, setTab] = useState('lobby');
            const [roomConfig, setRoomConfig] = useState(null);

            const handleJoin = (code, user, isHost, isSpectator = false, count = 2) => {
                setRoomConfig({ code, user, isHost, isSpectator, hostDefinedMax: count });
                setTab('play');
            };

            const handleLeaveLobby = () => {
                setRoomConfig(null);
                setTab('lobby');
            }

            return (
                <GameProvider>
                    <div className="flex flex-col min-h-screen">
                        <header className="bg-stone-900 border-b border-stone-800 p-3 flex justify-between items-center px-6">
                            <h1 className="text-sm font-black tracking-widest text-amber-500 uppercase">GoldBurn <span className="text-stone-500 text-[9px] ml-1">V10 Test</span></h1>
                            {(tab === 'lobby' || tab === 'forge') && (
                                <nav className="flex gap-2">
                                    <button onClick={()=>setTab('lobby')} className={`text-xs px-4 py-1.5 rounded font-bold uppercase tracking-wider transition ${tab==='lobby'?'bg-stone-800 text-stone-200':'text-stone-500 hover:text-stone-300'}`}>Arena</button>
                                    <button onClick={()=>setTab('forge')} className={`text-xs px-4 py-1.5 rounded font-bold uppercase tracking-wider transition ${tab==='forge'?'bg-stone-800 text-stone-200':'text-stone-500 hover:text-stone-300'}`}>Deck Builder</button>
                                </nav>
                            )}
                        </header>
                        
                        <main className="flex-1 overflow-hidden">
                            {tab === 'forge' && <DeckBuilder onTestDeck={() => setTab('solo_test')} />}
                            {tab === 'lobby' && <Lobby onJoin={handleJoin} />}
                            {tab === 'play' && (
                                <GameContext.Consumer>
                                    {({ customDeck }) => <SandboxBoard roomCode={roomConfig.code} username={roomConfig.user} isHost={roomConfig.isHost} isSpectator={roomConfig.isSpectator} hostDefinedMax={roomConfig.hostDefinedMax} customDeck={customDeck} onLeaveLobby={handleLeaveLobby} />}
                                </GameContext.Consumer>
                            )}
                            {tab === 'solo_test' && (
                                <GameContext.Consumer>
                                    {({ customDeck }) => <SandboxBoard roomCode="TEST" username="Tester" isHost={true} isSpectator={false} hostDefinedMax={2} customDeck={customDeck} onLeaveLobby={()=>setTab('forge')} isSoloTest={true} />}
                                </GameContext.Consumer>
                            )}
                        </main>
                    </div>
                </GameProvider>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
