            { id: 'BM_bloodmoney', name: 'Blood Money', type: 'Act', subtypes: ['Fast'], limit: 3, cost: 0, burn: 2, set: 'K. Blood Money', image: '(BM) BloodMoney.jpg', description: 'You can only activate this card when a your opponent destroys a card you control: Gain gold equal to the burn of the destroyed card.' },

            { id: 'BM_definspector', name: 'DEF- Inspector', type: 'Troop', subtypes: ['Human', 'Engineer'], limit: 3, hp: 3, cost: 2, burn: 2, set: 'K. Blood Money', image: '(BM) DEFInspector.jpg', description: '(Summon): place 1 Cannon-Ball marker on a card you control Up to Specs (1)- Target a building you control without Withstand: Place a Withstand marker on it "These,, These machines do NOT meet the minimum required safely standards..."' },

            { id: 'BM_earthelemental', name: 'Earth Elemental', type: 'Troop', subtypes: ['Plant', 'Earth', 'Spirit'], limit: 3, hp: 7, cost: 5, burn: 2, set: 'K. Blood Money', image: '(BM) EarthElemental.jpg', description: 'If an Earth or Plant card is summoned: place 1 strength marker on this card. If this card is destroyed: add a Plant or Earth card from your deck to your hand whose cost is equal to the amount of strength markers this card had while it was on the field. Bark Smackdown (2)- Deal 4 dmg It speaks for the trees.' },

            { id: 'BM_urnofofferings', name: 'Urn of Offerings', type: 'Building', subtypes: [], limit: 3, hp: 1, cost: 2, burn: 2, set: 'K. Blood Money', image: '(BM) UrnOfOfferings.jpg', description: '(Hard Single) If this card is offered: You can summon 1 "Urn of Offerings" from your deck for no cost. Cleansing Aroma (1)- Heal 3 "Some things require more than just gold."' },
            { id: 'BM_malsymthepatron', name: 'Malsym, The Patron', type: 'Troop', subtypes: ['Deity', 'Demon'], limit: 3, hp: 12, cost: 6, burn: 2, set: 'K. Blood Money', image: '(BM) MalsymThePatron.jpg', description: 'Offering II. If a "The Patron" card was offered for this card\'s summon, you can activate this effect once while this card is on the field: Target 1 non-vital card your opponent controls; take control of that target. Cause Writhing (1)- Deal 5 dmg And Malsym will bestow upon you his most divine of blessings: Submission.' },

                setCustomDeck(prev => {
                    const cardDef = MASTER_CARDS.find(c => c.id === id);
                    const limit = cardDef.limit !== undefined ? cardDef.limit : 3;
                    const currentQty = prev[id] || 0;
                    let nextQty = currentQty + amount;
                    nextQty = Math.max(0, Math.min(nextQty, limit));

                    const next = { ...prev, [id]: nextQty };
                    if (next[id] === 0) delete next[id];
                    localStorage.setItem('v1_saved_deck', JSON.stringify(next));
                    return next;
                });
            };

            const loadEntireDeck = (deckObj) => {
                const cleaned = {};
                for (const key in deckObj) {
                    const cardDef = MASTER_CARDS.find(c => c.id === key);
                    if (cardDef) {
                        const limit = cardDef.limit !== undefined ? cardDef.limit : 3;
                        cleaned[key] = Math.min(deckObj[key], limit); 
                    }
                }
                setCustomDeck(cleaned);
                localStorage.setItem('v1_saved_deck', JSON.stringify(cleaned));
            };

            const clearDeck = () => {
                setCustomDeck({});
                localStorage.setItem('v1_saved_deck', '{}');
            };

            const saveCustomDeck = (name) => {
                if(!name) return;
                const newDecks = { ...savedDecks, [name]: customDeck };
                setSavedDecks(newDecks);
                localStorage.setItem('v1_saved_decks_list', JSON.stringify(newDecks));
            };
            
            const deleteCustomDeck = (name) => {
                if(!name || !savedDecks[name]) return;
                const newDecks = { ...savedDecks };
                delete newDecks[name];
                setSavedDecks(newDecks);
                localStorage.setItem('v1_saved_decks_list', JSON.stringify(newDecks));
            };

            return (
                <GameContext.Provider value={{ customDeck, updateDeckQty, loadEntireDeck, clearDeck, savedDecks, saveCustomDeck, deleteCustomDeck }}>
                    {children}
                </GameContext.Provider>
            );
        };

        // ============================================================================
        // DECK BUILDER (FORGE)
        // ============================================================================
        const DeckBuilder = ({ onTestDeck }) => {
            const { customDeck, updateDeckQty, loadEntireDeck, clearDeck, savedDecks, saveCustomDeck, deleteCustomDeck } = useContext(GameContext);
            const [search, setSearch] = useState('');
            const [searchKeyword, setSearchKeyword] = useState('');
            const [costFilter, setCostFilter] = useState('All');
            const [typeFilter, setTypeFilter] = useState('All');
            const [setFilter, setSetFilter] = useState('All');
            const [sortOrder, setSortOrder] = useState('A-Z');
            const [deckListSort, setDeckListSort] = useState('Name');
            
            const [selectedSubtypes, setSelectedSubtypes] = useState([]);
            const [selectedSpeeds, setSelectedSpeeds] = useState([]);
            const [showSubtypeMenu, setShowSubtypeMenu] = useState(false);
            const [showDeckManager, setShowDeckManager] = useState(false);
            const [zoomedCard, setZoomedCard] = useState(null);

            const [selectedStarter, setSelectedStarter] = useState(Object.keys(STARTER_DECKS)[0]);
            const [selectedCustom, setSelectedCustom] = useState('');
            const [saveDeckName, setSaveDeckName] = useState('');
            const [importString, setImportString] = useState('');
            
            const [confirmDialog, setConfirmDialog] = useState(null);
            const [exportData, setExportData] = useState(null);

            const uniqueTypes = [...new Set(MASTER_CARDS.map(c => c.type))].sort();
            const uniqueSets = [...new Set(MASTER_CARDS.map(c => c.set))].sort();
            
            const allSubtypes = useMemo(() => {
                const subtypes = new Set();
                MASTER_CARDS.forEach(c => {
                    if (c.subtypes) c.subtypes.forEach(st => subtypes.add(st));
                });
                subtypes.delete('Fast');
                subtypes.delete('Slow');
                return Array.from(subtypes).sort();
            }, []);

            const incCost = () => setCostFilter(prev => prev === 'All' ? 0 : prev === 'X' ? 0 : prev + 1);
            const decCost = () => setCostFilter(prev => prev === 'All' ? 0 : prev === 'X' ? 0 : Math.max(0, prev - 1));
            const clearCost = () => setCostFilter('All');
            const setCostToX = () => setCostFilter('X');
            
            const handleSubtypeToggle = (st) => {
                setSelectedSubtypes(prev => prev.includes(st) ? prev.filter(s => s !== st) : [...prev, st]);
            };

            const handleSpeedToggle = (speed) => {
                setSelectedSpeeds(prev => prev.includes(speed) ? prev.filter(s => s !== speed) : [...prev, speed]);
            };

            const filteredCards = useMemo(() => {
                let result = MASTER_CARDS.filter(card => {
                    if (search && !card.name.toLowerCase().includes(search.toLowerCase())) return false;
                    if (searchKeyword && (!card.description || !card.description.toLowerCase().includes(searchKeyword.toLowerCase()))) return false;
                    if (costFilter !== 'All' && card.cost !== costFilter) return false;
                    if (typeFilter !== 'All' && card.type !== typeFilter) return false;
                    if (setFilter !== 'All' && card.set !== setFilter) return false;

                    if (selectedSubtypes.length > 0) {
                        if (!card.subtypes || !selectedSubtypes.some(st => card.subtypes.includes(st))) return false;
                    }
                    if (selectedSpeeds.length > 0) {
                        if (!card.subtypes || !selectedSpeeds.some(st => card.subtypes.includes(st))) return false;
                    }
                    return true;
                });
                result.sort((a, b) => {
                    if (sortOrder === 'A-Z') return a.name.localeCompare(b.name);
                    if (sortOrder === 'Z-A') return b.name.localeCompare(a.name);
                    return 0;
                });
                return result;
            }, [search, searchKeyword, costFilter, typeFilter, setFilter, sortOrder, selectedSubtypes, selectedSpeeds]);

            const deckEntries = Object.entries(customDeck);
            const vitalEntries = deckEntries.filter(([id]) => MASTER_CARDS.find(c => c.id === id)?.type === 'Vital');
            const mainEntries = deckEntries.filter(([id]) => MASTER_CARDS.find(c => c.id === id)?.type !== 'Vital');
            const totalCount = mainEntries.reduce((acc, [_, qty]) => acc + qty, 0);
            
            const isMissingVital = vitalEntries.length === 0;
            const isInvalidSize = totalCount !== 30;

            const sortedMainEntries = useMemo(() => {
                return [...mainEntries].sort((a, b) => {
                    const cardA = MASTER_CARDS.find(c => c.id === a[0]);
                    const cardB = MASTER_CARDS.find(c => c.id === b[0]);
                    if (!cardA || !cardB) return 0;
                    if (deckListSort === 'Type') return cardA.type.localeCompare(cardB.type);
                    if (deckListSort === 'Cost') {
                        const costA = cardA.cost === 'X' ? 99 : parseInt(cardA.cost) || 0;
                        const costB = cardB.cost === 'X' ? 99 : parseInt(cardB.cost) || 0;
                        return costA - costB;
                    }
                    return cardA.name.localeCompare(cardB.name);
                });
            }, [mainEntries, deckListSort]);

            const handleExport = () => {
                const dataStr = JSON.stringify(customDeck);
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(dataStr).then(() => {
                        setConfirmDialog({ msg: "Deck code copied to clipboard!", isAlert: true });
                    }).catch(() => setExportData(dataStr));
                } else {
                    setExportData(dataStr);
                }
            };
            
            const handleImport = () => {
                if(!importString.trim()) return;
                try {
                    const parsed = JSON.parse(importString);
                    loadEntireDeck(parsed);
                    setImportString('');
                    setConfirmDialog({ msg: "Deck imported successfully!", isAlert: true });
                } catch(e) {
                    setConfirmDialog({ msg: "Invalid deck code format.", isAlert: true });
                }
            };
            
            const handleLoadStarter = () => {
                const deckObj = STARTER_DECKS[selectedStarter];
                if (deckObj) {
                    setConfirmDialog({
                        msg: `Are you sure you want to overwrite your current deck with ${selectedStarter}?`,
                        onConfirm: () => { loadEntireDeck(deckObj); setConfirmDialog(null); }
                    });
                }
            };

            const handleLoadCustom = () => {
                const deckObj = savedDecks[selectedCustom];
                if (deckObj) {
                    setConfirmDialog({
                        msg: `Are you sure you want to load custom deck: ${selectedCustom}?`,
                        onConfirm: () => { loadEntireDeck(deckObj); setConfirmDialog(null); }
                    });
                }
            };
            
            const handleDeleteCustom = () => {
                if (!selectedCustom) return;
                setConfirmDialog({
                    msg: `Are you sure you want to delete the saved deck: "${selectedCustom}"?`,
                    onConfirm: () => { 
                        deleteCustomDeck(selectedCustom); 
                        setSelectedCustom(''); 
                        setConfirmDialog(null); 
                    }
                });
            };

            const handleClear = () => {
                setConfirmDialog({
                    msg: "Are you sure you want to clear your current deck?",
                    onConfirm: () => { clearDeck(); setConfirmDialog(null); }
                });
            };

            return (
                <div className="grid grid-cols-1 xl:grid-cols-12 gap-6 p-6 max-w-[1500px] mx-auto">
                    
                    {confirmDialog && (
                        <div className="fixed inset-0 bg-black/80 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-stone-900 border border-amber-500 rounded-xl p-6 max-w-sm w-full text-center shadow-2xl">
                                <p className="text-stone-200 mb-6">{confirmDialog.msg}</p>
                                <div className="flex gap-4 justify-center">
                                    {!confirmDialog.isAlert && (
                                        <button onClick={() => setConfirmDialog(null)} className="flex-1 bg-stone-800 hover:bg-stone-700 py-2 rounded text-stone-300 transition">Cancel</button>
                                    )}
                                    <button onClick={confirmDialog.isAlert ? () => setConfirmDialog(null) : confirmDialog.onConfirm} className="flex-1 bg-amber-700 hover:bg-amber-600 py-2 rounded text-white font-bold transition">
                                        {confirmDialog.isAlert ? 'OK' : 'Confirm'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {exportData && (
                        <div className="fixed inset-0 bg-black/80 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-stone-900 border border-amber-500 rounded-xl p-6 max-w-md w-full shadow-2xl">
                                <h3 className="text-amber-500 font-bold mb-2 uppercase tracking-widest text-sm">Deck Export</h3>
                                <p className="text-xs text-stone-400 mb-4">Copy the code below manually.</p>
                                <textarea readOnly value={exportData} className="w-full h-40 bg-stone-950 text-stone-300 text-[10px] font-mono p-3 rounded border border-stone-700 mb-4 focus:outline-none focus:border-amber-500" />
                                <button onClick={() => setExportData(null)} className="w-full bg-amber-700 hover:bg-amber-600 py-2 rounded text-white font-bold uppercase transition">Close</button>
                            </div>
                        </div>
                    )}

                    <div className="xl:col-span-8 bg-stone-900 border border-amber-900/30 rounded-2xl p-3 md:p-5 shadow-2xl flex flex-col h-[60vh] min-h-[500px] xl:h-[750px]">
                        <div className="border-b border-stone-800 pb-4 mb-4">
                            <h2 className="text-lg font-bold text-amber-500 uppercase tracking-wide mb-3">Deck Builder</h2>
                            
                            <div className="grid grid-cols-1 md:grid-cols-6 gap-3 mb-3">
                                <input type="text" placeholder="Search by Card Name..." value={search} onChange={(e)=>setSearch(e.target.value)} className="col-span-1 md:col-span-3 bg-stone-950 border border-stone-800 rounded px-3 py-1.5 text-stone-200 outline-none focus:border-amber-600 text-xs" />
                                <input type="text" placeholder="Search Descriptions/Keywords..." value={searchKeyword} onChange={(e)=>setSearchKeyword(e.target.value)} className="col-span-1 md:col-span-3 bg-stone-950 border border-stone-800 rounded px-3 py-1.5 text-stone-200 outline-none focus:border-amber-600 text-xs" />
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-4 gap-3 bg-stone-950 border border-stone-800 p-2 rounded text-xs mb-3 items-center">
                                <div className="col-span-1 flex items-center justify-between">
                                    <span className="text-stone-400 font-bold">Cost:</span>
                                    <div className="flex items-center">
                                        <button onClick={decCost} className="bg-stone-800 hover:bg-stone-700 text-stone-200 w-5 h-5 rounded flex items-center justify-center">-</button>
                                        <span className="w-8 text-center text-amber-500 font-bold">{costFilter}</span>
                                        <button onClick={incCost} className="bg-stone-800 hover:bg-stone-700 text-stone-200 w-5 h-5 rounded flex items-center justify-center">+</button>
                                        <button onClick={setCostToX} className={`ml-1 px-2 h-5 rounded font-bold text-[10px] flex items-center justify-center transition ${costFilter === 'X' ? 'bg-amber-600 text-stone-900' : 'bg-stone-800 hover:bg-stone-700 text-stone-200'}`}>X</button>
                                        {costFilter !== 'All' && <button onClick={clearCost} className="ml-2 text-rose-500 hover:text-rose-400 font-bold" title="Clear Cost Filter">X</button>}
                                    </div>
                                </div>
                                <select value={sortOrder} onChange={(e)=>setSortOrder(e.target.value)} className="col-span-1 bg-stone-900 border border-stone-700 rounded px-2 py-1.5 text-stone-300 outline-none">
                                    <option value="A-Z">Sort: A - Z</option><option value="Z-A">Sort: Z - A</option>
                                </select>
                                <select value={typeFilter} onChange={(e)=>setTypeFilter(e.target.value)} className="col-span-1 bg-stone-900 border border-stone-700 rounded px-2 py-1.5 text-stone-300 outline-none">
                                    <option value="All">All Types</option>{uniqueTypes.map(type => <option key={type} value={type}>{type}</option>)}
                                </select>
                                <select value={setFilter} onChange={(e)=>setSetFilter(e.target.value)} className="col-span-1 bg-stone-900 border border-stone-700 rounded px-2 py-1.5 text-stone-300 outline-none">
                                    <option value="All">All Sets</option>{uniqueSets.map(set => <option key={set} value={set}>{set}</option>)}
                                </select>
                            </div>

                            <div className="flex flex-col md:flex-row gap-4 bg-stone-950 border border-stone-800 p-2 rounded text-xs">
                                <div className="flex flex-col gap-1 min-w-[120px] border-r border-stone-800 pr-3">
                                    <span className="text-stone-500 font-bold uppercase tracking-widest text-[9px]">Act Speeds</span>
                                    <div className="flex gap-3">
                                        <label className="flex items-center gap-1 text-stone-300 cursor-pointer hover:text-amber-400 transition"><input type="checkbox" checked={selectedSpeeds.includes('Fast')} onChange={() => handleSpeedToggle('Fast')} className="accent-amber-600" /> Fast</label>
                                        <label className="flex items-center gap-1 text-stone-300 cursor-pointer hover:text-amber-400 transition"><input type="checkbox" checked={selectedSpeeds.includes('Slow')} onChange={() => handleSpeedToggle('Slow')} className="accent-amber-600" /> Slow</label>
                                    </div>
                                </div>
                                
                                <div className="flex-1 relative">
                                    <button onClick={() => setShowSubtypeMenu(!showSubtypeMenu)} className="bg-stone-900 border border-stone-700 hover:border-amber-700 text-stone-300 px-3 py-1 rounded w-full text-left flex justify-between items-center transition">
                                        <span>Filter by Subtypes ({selectedSubtypes.length} selected)</span>
                                        <span className="text-stone-500">{showSubtypeMenu ? '▲' : '▼'}</span>
                                    </button>
                                    {showSubtypeMenu && (
                                        <div className="absolute top-full left-0 right-0 mt-1 bg-stone-900 border border-stone-700 p-3 rounded shadow-xl z-30 max-h-48 overflow-y-auto grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-2">
                                            {allSubtypes.map(st => (
                                                <label key={st} className="flex items-center gap-1.5 text-stone-300 whitespace-nowrap cursor-pointer hover:text-amber-400 transition">
                                                    <input type="checkbox" checked={selectedSubtypes.includes(st)} onChange={() => handleSubtypeToggle(st)} className="accent-amber-600" /> {st}
                                                </label>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>

                        <div className="flex-1 overflow-y-auto pr-2 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3 content-start">
                            {filteredCards.map(card => {
                                const qty = customDeck[card.id] || 0;
                                const limit = card.limit !== undefined ? card.limit : 3;
                                const maxReached = qty >= limit;
                                return (
                                    <div key={card.id} className="bg-stone-950 border border-stone-850 p-3 rounded-xl flex flex-col hover:border-amber-900 transition h-48">
                                        <div className="shrink-0">
                                            <div className="flex justify-between items-start gap-2">
                                                <h4 className="font-bold text-stone-200 text-sm truncate">{card.name}</h4>
                                                <div className="flex items-center gap-2">
                                                    <button onClick={() => setZoomedCard(card)} className="text-stone-400 hover:text-amber-400 transition transform hover:scale-110" title="View Full Card">
                                                        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                                                    </button>
                                                    <span className="text-[10px] font-mono text-amber-500">{card.cost}G</span>
                                                </div>
                                            </div>
                                            <div className="flex justify-between items-center mt-1 pb-2 border-b border-stone-900">
                                                <span className="text-[9px] uppercase text-stone-500">{card.type} • {card.set}</span>
                                                <span className="text-[8px] text-stone-600 font-mono">Limit: {limit}</span>
                                            </div>
                                        </div>
                                        <div className="flex-1 overflow-y-auto my-2 pr-1">
                                            <p className="text-[11px] text-stone-400 italic leading-snug">{card.description}</p>
                                        </div>
                                        <div className="shrink-0 flex items-center justify-between border-t border-stone-900 pt-2">
                                            <span className="text-xs text-stone-500">In Deck: <b className="text-amber-500">{qty}</b></span>
                                            <div className="flex gap-1">
                                                <button onClick={() => updateDeckQty(card.id, -1)} className="w-6 h-6 bg-stone-900 hover:bg-stone-800 text-stone-300 rounded transition">-</button>
                                                <button onClick={() => !maxReached && updateDeckQty(card.id, 1)} className={`w-6 h-6 rounded transition ${maxReached ? 'bg-stone-900 text-stone-700 cursor-not-allowed' : 'bg-amber-900/40 hover:bg-amber-900/70 text-amber-400'}`}>+</button>
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    <div className="xl:col-span-4 flex flex-col gap-4 h-[60vh] min-h-[400px] xl:h-[750px]">
                        <div className="bg-stone-900 border border-amber-900/30 rounded-2xl p-5 shadow-2xl flex flex-col flex-1 min-h-0">
                            
                            {(isMissingVital || isInvalidSize) && (
                                <div className="bg-rose-950/40 border border-rose-900/50 p-2 rounded mb-3 flex flex-col gap-1 shrink-0">
                                    {isMissingVital && <span className="text-[10px] text-rose-400 font-bold uppercase">⚠️ Missing a Vital Card</span>}
                                    {isInvalidSize && <span className="text-[10px] text-rose-400 font-bold uppercase">⚠️ Deck size must be exactly 30 Main Forces</span>}
                                </div>
                            )}

                            <div className="border-b border-stone-800 pb-3 mb-3 flex justify-between items-center shrink-0">
                                <h3 className="text-sm font-bold text-stone-300 uppercase tracking-widest">Deck List</h3>
                                <select value={deckListSort} onChange={(e)=>setDeckListSort(e.target.value)} className="bg-stone-950 border border-stone-800 rounded px-2 py-0.5 text-[9px] text-stone-400 outline-none uppercase font-bold">
                                    <option value="Name">Sort: Name</option>
                                    <option value="Type">Sort: Type</option>
                                    <option value="Cost">Sort: Cost</option>
                                </select>
                                <span className={`text-[10px] font-mono font-black border px-2 py-1 rounded ${totalCount === 30 ? 'text-emerald-400 bg-emerald-950/30 border-emerald-900/50' : 'text-amber-400 bg-amber-950/30 border-amber-900/50'}`}>{totalCount} Cards</span>
                            </div>
                            
                            <div className="flex-1 overflow-y-auto space-y-4 pr-1">
                                <div>
                                    <span className="text-[9px] uppercase tracking-widest text-stone-500 font-bold block mb-1">Vital Card (Not Counted)</span>
                                    <div className="space-y-1.5">
                                        {vitalEntries.length > 0 ? vitalEntries.map(([id, qty]) => {
                                            const c = MASTER_CARDS.find(x => x.id === id);
                                            return c ? (
                                                <div key={id} className="bg-stone-950 border border-stone-800 px-3 py-2 rounded-xl flex justify-between items-center group">
                                                    <div>
                                                        <div className="flex items-center gap-2 mb-0.5">
                                                            <div className="text-xs font-bold text-stone-200">{c.name}</div>
                                                            <button onClick={(e) => { e.stopPropagation(); setZoomedCard(c); }} className="text-stone-500 hover:text-amber-400 transition" title="Preview Card">
                                                                <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                                                            </button>
                                                        </div>
                                                        <div className="text-[9px] text-amber-500">{c.type}</div>
                                                    </div>
                                                    <div className="flex items-center gap-3">
                                                        <span className="text-xs text-amber-500 font-bold">x{qty}</span>
                                                        <button onClick={() => updateDeckQty(id, -1)} className="text-rose-500 opacity-0 group-hover:opacity-100 transition text-[10px] font-bold">Drop</button>
                                                    </div>
                                                </div>
                                            ) : null;
                                        }) : <div className="text-[10px] italic text-rose-500/70 py-1">Missing a Vital card!</div>}
                                    </div>
                                </div>
                                <div>
                                    <span className="text-[9px] uppercase tracking-widest text-stone-500 font-bold block mb-1 border-t border-stone-800 pt-2">Main Forces</span>
                                    <div className="space-y-1.5">
                                        {sortedMainEntries.map(([id, qty]) => {
                                            const c = MASTER_CARDS.find(x => x.id === id);
                                            return c ? (
                                                <div key={id} className="bg-stone-950 border border-stone-850 px-3 py-2 rounded-xl flex justify-between items-center group">
                                                    <div>
                                                        <div className="flex items-center gap-2 mb-0.5">
                                                            <div className="text-xs font-bold text-stone-300">{c.name}</div>
                                                            <button onClick={(e) => { e.stopPropagation(); setZoomedCard(c); }} className="text-stone-500 hover:text-amber-400 transition" title="Preview Card">
                                                                <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                                                            </button>
                                                        </div>
                                                        <div className="text-[9px] text-stone-500">{c.type} • {c.cost}G</div>
                                                    </div>
                                                    <div className="flex items-center gap-3">
                                                        <span className="text-xs text-amber-500 font-bold">x{qty}</span>
                                                        <button onClick={() => updateDeckQty(id, -1)} className="text-rose-500 opacity-0 group-hover:opacity-100 transition text-[10px] font-bold">Drop</button>
                                                    </div>
                                                </div>
                                            ) : null;
                                        })}
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="bg-stone-900 border border-stone-800 rounded-2xl p-4 shadow-xl shrink-0 flex flex-col gap-3">
                            <button 
                                onClick={() => setShowDeckManager(!showDeckManager)} 
                                className="w-full flex justify-between items-center text-[10px] font-bold text-stone-500 uppercase tracking-widest outline-none hover:text-amber-500 transition-colors"
                            >
                                <span>⚙️ Deck Manager Tools</span>
                                <span>{showDeckManager ? '▲' : '▼'}</span>
                            </button>

                            {showDeckManager && (
                                <div className="flex flex-col gap-3 mt-2 border-t border-stone-800 pt-3">
                                    <div className="flex gap-2 mb-2">
                                        <select value={selectedStarter} onChange={(e)=>setSelectedStarter(e.target.value)} className="flex-1 bg-stone-950 border border-stone-800 rounded px-2 text-[10px] text-stone-300 outline-none">
                                            {Object.keys(STARTER_DECKS).map(name => <option key={name} value={name}>{name}</option>)}
                                        </select>
                                        <button onClick={handleLoadStarter} className="bg-amber-900/30 hover:bg-amber-900/60 text-amber-500 border border-amber-900/50 rounded px-3 py-1.5 text-[10px] font-bold uppercase transition">Load</button>
                                    </div>

                                    <div className="flex gap-2 mb-3 border-t border-stone-800 pt-2">
                                        <select value={selectedCustom} onChange={(e)=>setSelectedCustom(e.target.value)} className="flex-1 bg-stone-950 border border-stone-800 rounded px-2 text-[10px] text-stone-300 outline-none">
                                            <option value="">-- Load Saved Deck --</option>
                                            {Object.keys(savedDecks).map(name => <option key={name} value={name}>{name}</option>)}
                                        </select>
                                        <button onClick={handleLoadCustom} disabled={!selectedCustom} className={`px-3 py-1.5 rounded text-[10px] font-bold uppercase transition border ${!selectedCustom ? 'bg-stone-800 text-stone-600 border-stone-700' : 'bg-emerald-900/30 hover:bg-emerald-900/60 text-emerald-500 border-emerald-900/50'}`}>Load</button>
                                        <button onClick={handleDeleteCustom} disabled={!selectedCustom} className={`px-3 py-1.5 rounded text-[10px] font-bold uppercase transition border ${!selectedCustom ? 'bg-stone-800 text-stone-600 border-stone-700' : 'bg-rose-900/30 hover:bg-rose-900/60 text-rose-500 border-rose-900/50'}`}>Del</button>
                                    </div>

                                    <div className="flex gap-2 mb-3">
                                        <input type="text" value={saveDeckName} onChange={(e)=>setSaveDeckName(e.target.value)} placeholder="Name your deck..." className="flex-1 bg-stone-950 border border-stone-800 rounded px-2 py-1.5 text-[10px] text-stone-200 outline-none focus:border-emerald-600" />
                                        <button onClick={()=>{saveCustomDeck(saveDeckName); setSaveDeckName('');}} disabled={!saveDeckName.trim()} className={`px-3 py-1.5 rounded text-[10px] font-bold uppercase transition border ${!saveDeckName.trim() ? 'bg-stone-800 text-stone-600 border-stone-700' : 'bg-emerald-900/30 hover:bg-emerald-900/60 text-emerald-500 border-emerald-900/50'}`}>Save</button>
                                    </div>

                                    <div className="border-t border-stone-800 pt-3">
                                        <button onClick={handleClear} className="w-full mb-2 bg-rose-900/20 hover:bg-rose-900/50 text-rose-400 rounded px-3 py-1.5 text-[10px] font-bold uppercase transition border border-rose-900/50">Clear Deck</button>
                                        <button onClick={handleExport} className="w-full mb-2 bg-stone-800 hover:bg-stone-700 text-stone-300 rounded px-3 py-1.5 text-[10px] font-bold uppercase transition border border-stone-700">Export Deck to Clipboard</button>
                                        <div className="flex gap-2">
                                            <input type="text" value={importString} onChange={(e)=>setImportString(e.target.value)} placeholder="Paste deck code..." className="flex-1 bg-stone-950 border border-stone-800 rounded px-2 py-1.5 text-[10px] text-stone-200 outline-none focus:border-indigo-600" />
                                            <button onClick={handleImport} className="bg-indigo-900/30 hover:bg-indigo-900/60 text-indigo-400 border border-indigo-900/50 rounded px-3 py-1.5 text-[10px] font-bold uppercase transition">Import</button>
                                        </div>
                                    </div>
                                </div>
                            )}

                            <div className="border-t border-stone-800 pt-3 mt-1">
                                <button onClick={onTestDeck} className="w-full bg-emerald-900/40 hover:bg-emerald-900/70 text-emerald-400 border border-emerald-700/50 rounded py-3 text-xs font-black uppercase tracking-widest transition flex items-center justify-center gap-2">
                                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                                    Test Deck in Sandbox
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* ZOOM MODAL */}
                    {zoomedCard && (
                        <div className="fixed inset-0 bg-black/90 z-[60] flex items-center justify-center p-4 backdrop-blur-sm" onClick={() => setZoomedCard(null)}>
                            <div className="w-[300px] h-[420px] sm:w-[400px] sm:h-[560px] relative rounded-2xl overflow-hidden shadow-2xl border-2 border-amber-700" onClick={e => e.stopPropagation()}>
                                {zoomedCard.image ? (
                                     <img src={zoomedCard.image} alt={zoomedCard.name} className="w-full h-full object-cover" />
                                ) : (
                                    <div className="flex flex-col items-center justify-center h-full bg-stone-800 text-stone-200 p-6 text-center border-4 border-stone-900">
                                         <h2 className="text-3xl font-bold mb-4 text-amber-500">{zoomedCard.name}</h2>
                                         <p className="text-stone-400 italic text-sm">{zoomedCard.description}</p>
                                     </div>
                                )}
                                <button onClick={() => setZoomedCard(null)} className="absolute top-3 right-3 bg-stone-900/80 text-white rounded-full w-8 h-8 flex items-center justify-center hover:bg-rose-600 border border-stone-700 transition">X</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ============================================================================
        // v2 MULTIPLAYER LOBBY
        // ============================================================================
        const Lobby = ({ onJoin }) => {
            const [username, setUsername] = useState('');
            const [roomCode, setRoomCode] = useState('');
            const [playerCount, setPlayerCount] = useState(2);

            return (
                <div className="max-w-md mx-auto mt-20 bg-stone-900 border border-amber-900/30 rounded-2xl p-6 shadow-2xl text-center">
                    <h1 className="text-2xl font-black text-amber-500 uppercase tracking-widest mb-1">GoldBurn</h1>
                    <p className="text-xs text-stone-400 mb-6">Hope for smooth gameplay, expect errors lol.</p>
                    <div className="space-y-4 text-left">
                        <div>
                            <label className="text-[10px] font-bold text-stone-500 uppercase">Username</label>
                            <input type="text" value={username} onChange={e=>setUsername(e.target.value)} className="w-full bg-stone-950 border border-stone-800 rounded px-3 py-2 text-stone-200 outline-none focus:border-amber-600" placeholder="Example: aviyarn" />
                        </div>
                        <div>
                            <label className="text-[10px] font-bold text-stone-500 uppercase">Room Code (Leave blank to Create)</label>
                            <input type="text" value={roomCode} onChange={e=>setRoomCode(e.target.value)} className="w-full bg-stone-950 border border-stone-800 rounded px-3 py-2 text-amber-500 outline-none focus:border-amber-600" placeholder="Code is on top right" />
                        </div>
                        
                        {!roomCode && (
                            <div>
                                <label className="text-[10px] font-bold text-stone-500 uppercase">Match Size (Players)</label>
                                <div className="flex gap-2 mt-1">
                                    {[2,3,4].map(num => (
                                        <button 
                                            key={num} 
                                            onClick={() => setPlayerCount(num)} 
                                            className={`flex-1 py-2 rounded font-bold transition ${playerCount === num ? 'bg-amber-700 text-white' : 'bg-stone-950 border border-stone-800 text-stone-400 hover:border-amber-700'}`}
                                        >
                                            {num}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        <div className="flex flex-col gap-2 pt-2">
                            <button onClick={() => onJoin(roomCode || Math.random().toString(36).substring(2,6).toUpperCase(), username || 'Duelist', !roomCode, false, playerCount)} className="w-full bg-gradient-to-r from-amber-800 to-amber-950 text-amber-100 font-bold uppercase py-3 rounded-lg text-xs hover:brightness-110 border border-amber-700/50 transition shadow-lg">
                                {roomCode ? 'Join Match' : `Create ${playerCount}-Player Match`}
                            </button>
                            <button onClick={() => onJoin(roomCode || prompt("Enter Room Code to Spectate:"), username || 'Observer', false, true, 0)} className="w-full bg-stone-800 text-stone-300 font-bold uppercase py-2.5 rounded-lg text-xs hover:bg-stone-700 border border-stone-700 transition">
                                Spectate Match
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // ============================================================================
        // v2 MULTIPLAYER BOARD (STAR TOPOLOGY)
        // ============================================================================
        const SandboxBoard = ({ roomCode, username, isHost, isSpectator, hostDefinedMax, customDeck, onLeaveLobby, isSoloTest = false }) => {
            const [myPeerId, setMyPeerId] = useState(null);
            const [peer, setPeer] = useState(null);
            const [hostConn, setHostConn] = useState(null);
            const [connected, setConnected] = useState(false);
            
            // Host States
            const [hostConnections, setHostConnections] = useState([]);
            
            // Shared Match State
            const [matchPhase, setMatchPhase] = useState('SETUP'); // SETUP, PLAY
            const [maxPlayers, setMaxPlayers] = useState(isHost ? hostDefinedMax : 2);
            
            const [allPlayers, setAllPlayers] = useState({}); 
            const [allSpectators, setAllSpectators] = useState({});
            const [sharedZone, setSharedZone] = useState(null); 
            const [logs, setLogs] = useState([]);
            const [chatLogs, setChatLogs] = useState([]);

            // State Refs to fix PeerJS callback stale closures
            const matchStateRef = useRef({ phase: 'SETUP', players: {}, spectators: {}, zone: null, maxPlayers: 2 });
            useEffect(() => {
                matchStateRef.current = { phase: matchPhase, players: allPlayers, spectators: allSpectators, zone: sharedZone, maxPlayers };
            }, [matchPhase, allPlayers, allSpectators, sharedZone, maxPlayers]);

            const hostConnectionsRef = useRef([]);
            useEffect(() => { hostConnectionsRef.current = hostConnections; }, [hostConnections]);

            // Local State (Syncs to Host)
            const [myLocalState, setMyLocalState] = useState({
                username: username,
                color: PLAYER_COLORS[0].bg,
                isReady: false,
                isDead: false,
                grid: [ [null, null, null], [null, null, null] ],
                actSlot: null,
                gold: 0,
                hand: [],
                deck: [],
                grave: [],
                voidZone: [],
                vitalPos: null
            });
            
            // UI States
            const [confirmDialog, setConfirmDialog] = useState(null);
            const [alertDialog, setAlertDialog] = useState(null);
            const [setupColor, setSetupColor] = useState(PLAYER_COLORS[0]);
            
            const [selectedHandIdx, setSelectedHandIdx] = useState(null);
            const [inspectedCard, setInspectedCard] = useState(null);
            const [lockedInspectorId, setLockedInspectorId] = useState(null);
            const [isInspectorOpen, setIsInspectorOpen] = useState(() => typeof window !== 'undefined' && window.innerWidth >= 1024);
            const [showMarkersUI, setShowMarkersUI] = useState(false);
            const [diceType, setDiceType] = useState('6');
            const [viewModal, setViewModal] = useState({ isOpen: false, title: '', cards: [], type: null, onSelect: null });
            const [activeMenu, setActiveMenu] = useState(null);
            const [zoomedCard, setZoomedCard] = useState(null);
            const [modalSelectedIdx, setModalSelectedIdx] = useState(null);
            const [streamerMode, setStreamerMode] = useState(false);
            
            const [movingCard, setMovingCard] = useState(null);
            const [targetingSource, setTargetingSource] = useState(null);
            
            const [popupMsg, setPopupMsg] = useState(null);
            const popupTimer = useRef(null);
            const [chatInput, setChatInput] = useState('');
            const [tokenModal, setTokenModal] = useState(false);
            const [tokenData, setTokenData] = useState({ name: '', hp: 1 });
            const [placingToken, setPlacingToken] = useState(false);

            const [activePings, setActivePings] = useState([]);
            const pingTimers = useRef({});
            const [matchTime, setMatchTime] = useState(0);

            // ---------------------------------------------------------
            // INITIALIZATION
            // ---------------------------------------------------------
            useEffect(() => {
                let generatedDeck = [];
                Object.entries(customDeck).forEach(([id, qty]) => {
                    const card = MASTER_CARDS.find(c => c.id === id);
                    if(card) {
                        if (card.type === 'Vital') return;
                        for(let i=0; i<qty; i++) generatedDeck.push({ ...card, instanceId: Math.random().toString(36).substr(2,9), currentHp: card.hp });
                    }
                });
                generatedDeck.sort(() => Math.random() - 0.5);

                const startingHand = generatedDeck.splice(0, 5);
                setMyLocalState(prev => ({ ...prev, deck: generatedDeck, hand: startingHand }));

                if (isSoloTest) {
                    setConnected(true);
                    setMyPeerId('solo-id');
                    setMatchPhase('SETUP');
                    setMaxPlayers(2);
                    setAllPlayers({
                        'solo-id': { username, color: '#ef4444', isReady: false, isDead: false, grid: [[null,null,null],[null,null,null]], actSlot: null, gold: 3, hand: startingHand, deck: generatedDeck, grave: [], voidZone: [] },
                        'bot-id': { username: 'Enemy Bot', color: '#3b82f6', isReady: true, isDead: false, grid: [[null,null,null],[null,null,null]], actSlot: null, gold: 3, hand: [], deck: [], grave: [], voidZone: [] }
                    });
                }
            }, [customDeck, isSoloTest, username]);

            // ---------------------------------------------------------
            // PEER JS NETWORK LOGIC (STAR TOPOLOGY)
            // ---------------------------------------------------------
            useEffect(() => {
                if (isSoloTest) return;

                const hostId = `v1-${roomCode}`;
                let newPeer;

                if (isHost) {
                    newPeer = new Peer(hostId);
                    newPeer.on('open', id => {
                        setMyPeerId(id);
                        setConnected(true);
                        addLogSystem(`Room ${roomCode} created. Waiting for challengers...`);
                        
                        setAllPlayers({
                            [id]: { ...myLocalState, isHost: true }
                        });
                    });

                    newPeer.on('connection', conn => {
                        conn.on('data', data => {
                            const current = matchStateRef.current;
                            
                            if (data.type === 'HELLO') {
                                // Force spectator if explicitly requested, OR if match is ongoing, OR if room is full
                                if (data.isSpectator || current.phase === 'PLAY' || Object.keys(current.players).length >= current.maxPlayers) {
                                    setAllSpectators(prevS => {
                                        const nextS = { ...prevS, [conn.peer]: { username: data.username } };
                                        conn.send({ type: 'WELCOME', role: 'SPECTATOR', maxPlayers: current.maxPlayers });
                                        broadcastStateToAll([...hostConnectionsRef.current, conn], current.players, nextS, current.zone, current.phase, current.maxPlayers);
                                        return nextS;
                                    });
                                    setHostConnections(prev => [...prev, conn]);
                                    addLogSystem(`${data.username} started spectating.`);
                                } else {
                                    setAllPlayers(prevP => {
                                        const nextP = { ...prevP, [conn.peer]: { username: data.username, color: '#666', grid: [[null,null,null],[null,null,null]], isReady: false, isDead: false, gold: 0, hand: [], deck: [], grave: [], voidZone: [] } };
                                        conn.send({ type: 'WELCOME', role: 'PLAYER', maxPlayers: current.maxPlayers });
                                        broadcastStateToAll([...hostConnectionsRef.current, conn], nextP, current.spectators, current.zone, current.phase, current.maxPlayers);
                                        return nextP;
                                    });
                                    setHostConnections(prev => [...prev, conn]);
                                    addLogSystem(`${data.username} joined the match.`);
                                }
                            }

                            if (data.type === 'SYNC_LOCAL') {
                                setAllPlayers(prevP => {
                                    const nextP = { ...prevP, [conn.peer]: { ...prevP[conn.peer], ...data.state } };
                                    let nextPhase = current.phase;
                                    
                                    if (nextPhase === 'SETUP') {
                                        const playersArr = Object.values(nextP);
                                        if (playersArr.length === current.maxPlayers && playersArr.every(p => p.isReady)) {
                                            nextPhase = 'PLAY';
                                            setMatchPhase('PLAY');
                                            broadcastLog({ time: new Date().toLocaleTimeString(), msg: `All players locked in. Combat begins!`, color: '#eab308', senderName: 'SYSTEM' }, [...hostConnectionsRef.current, conn]);
                                        }
                                    }
                                    
                                    // Always broadcast sync updates immediately so elimination and grid moves apply for everyone
                                    broadcastStateToAll([...hostConnectionsRef.current, conn], nextP, current.spectators, current.zone, nextPhase, current.maxPlayers);
                                    return nextP;
                                });
                            }

                            if (data.type === 'SYNC_ZONE') {
                                setSharedZone(data.zone);
                                broadcastStateToAll([...hostConnectionsRef.current, conn], current.players, current.spectators, data.zone, current.phase, current.maxPlayers);
                            }

                            if (data.type === 'ACTION_LOG') broadcastLog(data.log, [...hostConnectionsRef.current, conn]);
                            if (data.type === 'PING') broadcastPing(data.ping, [...hostConnectionsRef.current, conn]);
                            if (data.type === 'CHAT') broadcastChat(data.chat, [...hostConnectionsRef.current, conn]);
                        });

                        conn.on('close', () => {
                            addLogSystem(`A connection was severed.`);
                            setHostConnections(prev => prev.filter(c => c.peer !== conn.peer));
                        });
                    });
                } else {
                    newPeer = new Peer();
                    newPeer.on('open', id => {
                        setMyPeerId(id);
                        const conn = newPeer.connect(hostId);
                        
                        conn.on('open', () => {
                            setHostConn(conn);
                            setConnected(true);
                            conn.send({ type: 'HELLO', isSpectator, username });
                        });

                        conn.on('data', data => {
                            if (data.type === 'WELCOME') {
                                setMaxPlayers(data.maxPlayers);
                                if (data.role === 'SPECTATOR') addLogSystem("You are spectating this match.");
                                else addLogSystem("Joined the match successfully.");
                            }
                            if (data.type === 'MATCH_STATE') {
                                setAllPlayers(data.players);
                                setAllSpectators(data.spectators);
                                setSharedZone(data.sharedZone);
                                if (data.phase !== matchPhase) setMatchPhase(data.phase);
                            }
                            if (data.type === 'LOG') setLogs(prev => [data.log, ...prev]);
                            if (data.type === 'CHAT') setChatLogs(prev => [...prev, data.chat]);
                            if (data.type === 'PING') receivePing(data.ping.source, data.ping.target, data.ping.color);
                        });

                        conn.on('close', () => {
                            setConnected(false);
                            setAlertDialog({ msg: "The Host has left the match. The connection is severed.", onClose: onLeaveLobby });
                        });
                    });
                }
                setPeer(newPeer);
                return () => newPeer.destroy();
            }, []);

            // ---------------------------------------------------------
            // HOST BROADCASTERS
            // ---------------------------------------------------------
            const broadcastStateToAll = (conns, pState, sState, zState, phase, maxP) => {
                if(!isHost) return;
                const payload = { type: 'MATCH_STATE', players: pState, spectators: sState, sharedZone: zState, phase, maxPlayers: maxP };
                conns.forEach(c => c.send(payload));
            };

            const broadcastLog = (logObj, conns) => {
                setLogs(prev => [logObj, ...prev]);
                if(!isHost) return;
                conns.forEach(c => c.send({ type: 'LOG', log: logObj }));
            };

            const broadcastChat = (chatObj, conns) => {
                setChatLogs(prev => [...prev, chatObj]);
                if(!isHost) return;
                conns.forEach(c => c.send({ type: 'CHAT', chat: chatObj }));
            };

            const broadcastPing = (pingObj, conns) => {
                receivePing(pingObj.source, pingObj.target, pingObj.color);
                if(!isHost) return;
                conns.forEach(c => c.send({ type: 'PING', ping: pingObj }));
            };

            // Sync Local -> Host -> All
            useEffect(() => {
                if (isSoloTest || isSpectator || !connected || !myPeerId) return;
                
                if (isHost) {
                    setAllPlayers(prevP => {
                        const nextP = { ...prevP, [myPeerId]: { ...prevP[myPeerId], ...myLocalState } };
                        let nextPhase = matchPhase; // Read captured phase
                        if (nextPhase === 'SETUP') {
                            const playersArr = Object.values(nextP);
                            if (playersArr.length === maxPlayers && playersArr.every(p => p.isReady)) {
                                nextPhase = 'PLAY';
                                setMatchPhase('PLAY');
                                broadcastLog({ time: new Date().toLocaleTimeString(), msg: `All players locked in. Combat begins!`, color: '#eab308', senderName: 'SYSTEM' }, hostConnections);
                            }
                        }
                        
                        // Reference current spectators and zone to prevent dependency looping
                        broadcastStateToAll(hostConnectionsRef.current, nextP, matchStateRef.current.spectators, matchStateRef.current.zone, nextPhase, matchStateRef.current.maxPlayers);
                        return nextP;
                    });
                } else if (hostConn) {
                    hostConn.send({ type: 'SYNC_LOCAL', state: myLocalState });
                }
            }, [myLocalState, isHost, connected, myPeerId, hostConn, isSpectator, isSoloTest]);

            // Sync Host Zone Updates
            useEffect(() => {
                if (isSoloTest || !isHost || !connected) return;
                broadcastStateToAll(hostConnectionsRef.current, matchStateRef.current.players, matchStateRef.current.spectators, sharedZone, matchStateRef.current.phase, matchStateRef.current.maxPlayers);
            }, [sharedZone, isHost, connected]);


            // Timer
            useEffect(() => {
                let interval;
                if (matchPhase === 'PLAY' && connected && !isSoloTest) {
                    interval = setInterval(() => setMatchTime(prev => prev + 1), 1000);
                }
                return () => clearInterval(interval);
            }, [matchPhase, connected, isSoloTest]);

            const formatTime = (secs) => `${String(Math.floor(secs / 60)).padStart(2, '0')}:${String(secs % 60).padStart(2, '0')}`;

            // ---------------------------------------------------------
            // ACTIONS
            // ---------------------------------------------------------
            const addLogSystem = (msg) => {
                const logObj = { time: new Date().toLocaleTimeString(), msg, color: '#a8a29e', senderName: 'SYSTEM' };
                setLogs(prev => [logObj, ...prev]);
            };

            const dispatchLog = (msg) => {
                const logObj = { time: new Date().toLocaleTimeString(), msg, color: myLocalState.color, senderName: username };
                if (isSoloTest) setLogs(prev => [logObj, ...prev]);
                else if (isHost) broadcastLog(logObj, hostConnections);
                else if (hostConn) hostConn.send({ type: 'ACTION_LOG', log: logObj });
            };

            const handleSendChat = () => {
                const msg = chatInput.trim();
                if (!msg) return;
                const chatObj = { sender: username, msg: msg, color: myLocalState.color };
                if (isSoloTest) setChatLogs(prev => [...prev, chatObj]);
                else if (isHost) broadcastChat(chatObj, hostConnections);
                else if (hostConn) hostConn.send({ type: 'CHAT', chat: chatObj });
                setChatInput('');
            };

            const receivePing = (source, target, color) => {
                const pingId = Math.random().toString(36).substr(2,9);
                setActivePings(prev => [...prev, { id: pingId, source, target, color }]);
                pingTimers.current[pingId] = setTimeout(() => {
                    setActivePings(prev => prev.filter(p => p.id !== pingId));
                    delete pingTimers.current[pingId];
                }, 2000);
            };

            const sendPing = (source, target) => {
                if (source === target) return;
                const pingObj = { source, target, color: myLocalState.color };
                if (isSoloTest) receivePing(source, target, pingObj.color);
                else if (isHost) broadcastPing(pingObj, hostConnections);
                else if (hostConn) hostConn.send({ type: 'PING', ping: pingObj });
            };

            const handleColorPick = (c) => {
                setSetupColor(c);
                setMyLocalState(prev => ({...prev, color: c.bg}));
            };

            const lockVitalPlacement = () => {
                if (!myLocalState.vitalPos) { setAlertDialog({ msg: "Select an Empty Space to place your Vital!" }); return; }
                const chosenVitalId = Object.keys(customDeck).find(id => MASTER_CARDS.find(c => c.id === id)?.type === 'Vital');
                const vitalDef = MASTER_CARDS.find(c => c.id === chosenVitalId);
                
                let newGrid = [...myLocalState.grid];
                newGrid[myLocalState.vitalPos.r] = [...newGrid[myLocalState.vitalPos.r]];
                newGrid[myLocalState.vitalPos.r][myLocalState.vitalPos.c] = { ...vitalDef, instanceId: 'vital_1', currentHp: vitalDef.hp };

                setMyLocalState(prev => ({ ...prev, grid: newGrid, isReady: true, gold: isHost ? 3 : 0 }));
                dispatchLog(`Deployed their Vital and locked in.`);
            };

            const modifyGold = (amt) => {
                setMyLocalState(prev => ({ ...prev, gold: Math.max(0, prev.gold + amt) }));
                dispatchLog(`${amt > 0 ? 'gained' : 'spent'} ${Math.abs(amt)} Gold.`);
            };

            const executeRoll = () => {
                let finalMsg = '';
                if (diceType === 'coin') {
                    finalMsg = `flipped a coin: [ ${Math.random() < 0.5 ? 'Heads' : 'Tails'} ]`;
                } else {
                    const sides = parseInt(diceType);
                    finalMsg = `rolled a D${sides} and got: [ ${Math.floor(Math.random() * sides) + 1} ]`;
                }
                dispatchLog(finalMsg);
            };

            const drawFromDeck = () => {
                if (myLocalState.deck.length === 0) return;
                setMyLocalState(prev => {
                    const d = [...prev.deck];
                    const card = d.pop();
                    return { ...prev, deck: d, hand: [...prev.hand, card] };
                });
                dispatchLog(`drew a card.`);
            };

            const searchDeckDraw = (realIdx) => {
                setMyLocalState(prev => {
                    const d = [...prev.deck];
                    const card = d.splice(realIdx, 1)[0];
                    return { ...prev, deck: d, hand: [...prev.hand, card] };
                });
                setViewModal({ isOpen: false });
                dispatchLog(`searched their deck and drew a card.`);
            };

            const openViewer = (title, cards, type, selectable = false) => {
                setModalSelectedIdx(null);
                setViewModal({ isOpen: true, title: title, cards: cards, type: type, onSelect: selectable ? searchDeckDraw : null });
            };

            const moveFromPile = (source, idx, dest) => {
                setMyLocalState(prev => {
                    let newGrave = [...prev.grave];
                    let newVoid = [...prev.voidZone];
                    let newHand = [...prev.hand];
                    let newDeck = [...prev.deck];
                    let card;

                    if (source === 'myGrave') card = newGrave.splice(idx, 1)[0];
                    else if (source === 'myVoid') card = newVoid.splice(idx, 1)[0];

                    setViewModal(vm => ({...vm, cards: source === 'myGrave' ? newGrave : newVoid}));

                    if (dest === 'hand') { newHand.push(card); dispatchLog(`recovered ${card.name} to their hand.`); }
                    else if (dest === 'void') { newVoid.unshift(card); dispatchLog(`expelled ${card.name} to the Void.`); }
                    else if (dest === 'grave') { newGrave.unshift(card); dispatchLog(`returned ${card.name} to the Graveyard.`); }
                    else if (dest === 'deck') { newDeck.push(card); newDeck.sort(()=>Math.random()-0.5); dispatchLog(`shuffled ${card.name} into their Deck.`); }
                    
                    return { ...prev, grave: newGrave, voidZone: newVoid, hand: newHand, deck: newDeck };
                });
                setModalSelectedIdx(null);
            };

            const updateMyCard = (instanceId, updater) => {
                setMyLocalState(prev => {
                    let updated = false;
                    let newGrid = prev.grid.map(row => row.map(c => {
                        if(c?.instanceId === instanceId) { updated = true; const newC = updater(c); if(inspectedCard?.instanceId === instanceId) setInspectedCard(newC); return newC; }
                        return c;
                    }));
                    if (updated) return { ...prev, grid: newGrid };

                    if (prev.actSlot?.instanceId === instanceId) {
                        const newAct = updater(prev.actSlot);
                        if(inspectedCard?.instanceId === instanceId) setInspectedCard(newAct);
                        return { ...prev, actSlot: newAct };
                    }
                    return prev;
                });

                // Check Shared Zone
                if (sharedZone?.instanceId === instanceId) {
                    const newZone = updater(sharedZone);
                    if(inspectedCard?.instanceId === instanceId) setInspectedCard(newZone);
                    setSharedZone(newZone);
                    if (!isHost && hostConn) hostConn.send({ type: 'SYNC_ZONE', zone: newZone });
                }
            };

            const executeMove = (newR, newC) => {
                if (!movingCard || movingCard.type !== 'grid') return;
                const { r: oldR, c: oldC } = movingCard;
                
                if (myLocalState.grid[newR][newC] !== null) { addLogSystem(`Space is already occupied!`); return; }

                setMyLocalState(prev => {
                    let newGrid = [...prev.grid];
                    const cardToMove = newGrid[oldR][oldC];
                    newGrid[oldR] = [...newGrid[oldR]]; newGrid[oldR][oldC] = null;
                    newGrid[newR] = [...newGrid[newR]]; newGrid[newR][newC] = cardToMove;
                    dispatchLog(`moved ${cardToMove.name} to an Empty Space.`);
                    return { ...prev, grid: newGrid };
                });
                setMovingCard(null);
            };

            const handleSpawnToken = () => {
                if (!tokenData.name) return;
                setTokenModal(false);
                setPlacingToken(tokenData);
            };

            const placeToGrid = (r, c) => {
                if (myLocalState.grid[r][c] !== null) { addLogSystem(`Cannot place a card on an occupied space!`); return; }

                if (placingToken) {
                    const tokenCard = {
                        id: 'custom_token', name: placingToken.name || 'Token', type: 'Troop', currentHp: parseInt(placingToken.hp) || 1, image: '', instanceId: 'tok_' + Math.random().toString(36).substr(2, 9)
                    };
                    setMyLocalState(prev => {
                        let newGrid = [...prev.grid];
                        newGrid[r] = [...newGrid[r]]; newGrid[r][c] = tokenCard;
                        return { ...prev, grid: newGrid };
                    });
                    dispatchLog(`spawned a token: ${tokenCard.name}.`);
                    setPlacingToken(false);
                    return;
                }

                if (selectedHandIdx === null) return;
                const card = myLocalState.hand[selectedHandIdx];
                if (card.type.includes('Act') || card.type === 'Zone') { setAlertDialog({ msg: "Acts and Zones have specific slots in the middle!" }); return; }
                
                setMyLocalState(prev => {
                    let newGrid = [...prev.grid];
                    newGrid[r] = [...newGrid[r]]; newGrid[r][c] = card;
                    let newHand = [...prev.hand];
                    newHand.splice(selectedHandIdx, 1);
                    return { ...prev, grid: newGrid, hand: newHand };
                });
                setSelectedHandIdx(null); setLockedInspectorId(null);
                dispatchLog(`deployed ${card.name} to an Empty Space.`);
            };

            const placeToZone = () => {
                if (sharedZone !== null) { addLogSystem(`Zone slot is already occupied!`); return; }
                if (selectedHandIdx === null) return;
                const card = myLocalState.hand[selectedHandIdx];
                if (card.type !== 'Zone') return;
                
                setMyLocalState(prev => {
                    let newHand = [...prev.hand];
                    newHand.splice(selectedHandIdx, 1);
                    return { ...prev, hand: newHand };
                });
                setSelectedHandIdx(null); setLockedInspectorId(null);
                
                const zonedCard = { ...card, ownerId: myPeerId };
                setSharedZone(zonedCard);
                if (!isHost && hostConn) hostConn.send({ type: 'SYNC_ZONE', zone: zonedCard });
                dispatchLog(`established a new Zone: ${card.name}.`);
            };

            const placeToAct = () => {
                if (myLocalState.actSlot !== null) { addLogSystem(`Act slot is already occupied!`); return; }
                if (selectedHandIdx === null) return;
                const card = myLocalState.hand[selectedHandIdx];
                if (!card.type.includes('Act')) return;
                
                setMyLocalState(prev => {
                    let newHand = [...prev.hand];
                    newHand.splice(selectedHandIdx, 1);
                    return { ...prev, hand: newHand, actSlot: card };
                });
                setSelectedHandIdx(null); setLockedInspectorId(null);
                dispatchLog(`played ${card.type}: ${card.name}.`);
            };

            const modifyHealth = (instanceId, amt) => {
                let died = false;
                updateMyCard(instanceId, card => {
                    const newHp = card.currentHp + amt;
                    if (card.type === 'Vital' && newHp <= 0 && !myLocalState.isDead) died = true;
                    return { ...card, currentHp: newHp };
                });
                
                if (died) {
                    dispatchLog(`'s Vital has fallen. They have been eliminated!`);
                    setMyLocalState(prev => ({ ...prev, isDead: true }));
                }
            };

            const toggleActionUsed = (instanceId) => { updateMyCard(instanceId, card => ({ ...card, actionUsed: !card.actionUsed })); };

            const clearAllActions = () => {
                setMyLocalState(prev => ({
                    ...prev,
                    grid: prev.grid.map(row => row.map(c => c ? {...c, actionUsed: false} : c)),
                    actSlot: prev.actSlot ? {...prev.actSlot, actionUsed: false} : null
                }));
                dispatchLog(`refreshed all their action points.`);
            };

            const addMarker = (colorHex, delta) => {
                if(!inspectedCard) return;
                updateMyCard(inspectedCard.instanceId, card => {
                    const currentCount = card.markers?.[colorHex] || 0;
                    return { ...card, markers: { ...(card.markers || {}), [colorHex]: Math.max(0, currentCount + delta) } };
                });
            };

            const sendFieldCardAway = (type, dest, r=0, c=0) => {
                let card;
                if (type === 'zone') {
                    card = sharedZone;
                    setSharedZone(null);
                    if (!isHost && hostConn) hostConn.send({ type: 'SYNC_ZONE', zone: null });
                } else {
                    setMyLocalState(prev => {
                        let newGrid = [...prev.grid];
                        let newAct = prev.actSlot;
                        let newGrave = [...prev.grave];
                        let newVoid = [...prev.voidZone];
                        let newDeck = [...prev.deck];

                        if (type === 'grid') {
                            card = newGrid[r][c];
                            newGrid[r] = [...newGrid[r]]; newGrid[r][c] = null;
                        } else if (type === 'act') {
                            card = newAct;
                            newAct = null;
                        }

                        card = { ...card, markers: {}, actionUsed: false };

                        if (dest === 'grave') { newGrave.unshift(card); dispatchLog(`sent ${card.name} to the Graveyard.`); }
                        else if (dest === 'void') { newVoid.unshift(card); dispatchLog(`exiled ${card.name} to the Void.`); }
                        else if (dest === 'deck') { newDeck.push(card); newDeck.sort(()=>Math.random()-0.5); dispatchLog(`shuffled ${card.name} into their Deck.`); }

                        return { ...prev, grid: newGrid, actSlot: newAct, grave: newGrave, voidZone: newVoid, deck: newDeck };
                    });
                }
                setActiveMenu(null); setLockedInspectorId(null);
            };

            const sendHandCardAway = (idx, dest) => {
                setMyLocalState(prev => {
                    let newHand = [...prev.hand];
                    let newGrave = [...prev.grave];
                    let newVoid = [...prev.voidZone];
                    let newDeck = [...prev.deck];
                    const card = newHand.splice(idx, 1)[0];

                    if (dest === 'grave') { newGrave.unshift(card); dispatchLog(`discarded ${card.name} to the Graveyard.`); }
                    else if (dest === 'void') { newVoid.unshift(card); dispatchLog(`exiled ${card.name} from hand to the Void.`); }
                    else if (dest === 'deck') { newDeck.push(card); newDeck.sort(()=>Math.random()-0.5); dispatchLog(`shuffled ${card.name} from their hand into the Deck.`); }

                    return { ...prev, hand: newHand, grave: newGrave, voidZone: newVoid, deck: newDeck };
                });
                setSelectedHandIdx(null); setLockedInspectorId(null);
            };

            const isMyCard = useMemo(() => {
                if(!inspectedCard || isSpectator) return false;
                const id = inspectedCard.instanceId;
                return myLocalState.grid.flat().some(c=>c?.instanceId===id) || myLocalState.actSlot?.instanceId===id || sharedZone?.instanceId===id;
            }, [inspectedCard, myLocalState, sharedZone, isSpectator]);

            const clearInteractions = () => {
                setActiveMenu(null); setMovingCard(null); setTargetingSource(null); setLockedInspectorId(null); setSelectedHandIdx(null); if (placingToken) setPlacingToken(false);
            };

            // ---------------------------------------------------------
            // RENDER HELPERS
            // ---------------------------------------------------------
            const renderCardLayout = (card, showMenuParams) => {
                return (
                    <div className="w-full h-full border-2 border-stone-800 rounded-lg bg-stone-850 shadow-md flex flex-col group relative">
                        <div className="absolute inset-0 rounded-lg overflow-hidden">
                            {card.image && (
                                <img src={card.image} alt={card.name} className={`absolute inset-0 w-full h-full object-cover transition ${card.actionUsed ? 'opacity-40 grayscale blur-[1px]' : 'opacity-80 group-hover:opacity-100'}`} />
                            )}
                            {!card.image && (
                                <div className="absolute inset-0 p-2 flex flex-col items-center justify-center bg-stone-900">
                                    <span className="text-[9px] font-bold text-stone-200 text-center">{card.name}</span>
                                </div>
                            )}
                            {card.actionUsed && (
